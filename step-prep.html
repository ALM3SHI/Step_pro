<meta charset="utf-8">
<title>منصة ستيب برو — التحضير لاختبار STEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STEP PRO">
<meta name="theme-color" content="#01589b">
<style>
:root{
  --bg:#F7F3EC; --surface:#FFFFFF; --surface2:#F0EAE0; --ink:#1E2B29; --muted:#5C6B68;
  --brand:#0E5A54; --brand-ink:#FFFFFF; --brand-soft:#E2EFED; --accent:#D98E32; --accent-soft:#F9EBD8;
  --good:#2E7D4F; --good-soft:#E3F1E8; --bad:#C0392B; --bad-soft:#F9E5E2; --line:#E3DDD2;
  --shadow:0 2px 10px rgba(30,43,41,.08);
}
@media (prefers-color-scheme: dark){:root{
  --bg:#0F1B19; --surface:#16221F; --surface2:#1C2A27; --ink:#E8EFED; --muted:#93A5A1;
  --brand:#3FA79A; --brand-ink:#07211E; --brand-soft:#12312D; --accent:#E5A44E; --accent-soft:#33270F;
  --good:#57B87F; --good-soft:#15301F; --bad:#E06A57; --bad-soft:#3A1712; --line:#26363216;
  --line:#263632; --shadow:0 2px 10px rgba(0,0,0,.35);
}}
:root[data-theme="light"]{
  --bg:#F7F3EC; --surface:#FFFFFF; --surface2:#F0EAE0; --ink:#1E2B29; --muted:#5C6B68;
  --brand:#0E5A54; --brand-ink:#FFFFFF; --brand-soft:#E2EFED; --accent:#D98E32; --accent-soft:#F9EBD8;
  --good:#2E7D4F; --good-soft:#E3F1E8; --bad:#C0392B; --bad-soft:#F9E5E2; --line:#E3DDD2;
  --shadow:0 2px 10px rgba(30,43,41,.08);
}
:root[data-theme="dark"]{
  --bg:#0F1B19; --surface:#16221F; --surface2:#1C2A27; --ink:#E8EFED; --muted:#93A5A1;
  --brand:#3FA79A; --brand-ink:#07211E; --brand-soft:#12312D; --accent:#E5A44E; --accent-soft:#33270F;
  --good:#57B87F; --good-soft:#15301F; --bad:#E06A57; --bad-soft:#3A1712; --line:#263632;
  --shadow:0 2px 10px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Segoe UI","Noto Naskh Arabic",Tahoma,Arial,sans-serif;line-height:1.65}
#app{direction:rtl;max-width:980px;margin:0 auto;padding:0 16px 80px}
.en{direction:ltr;text-align:left;font-family:Georgia,"Times New Roman",serif}
button{font-family:inherit;cursor:pointer}
button:focus-visible,a:focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* top bar */
.topbar{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:2px solid var(--line);margin-bottom:14px;flex-wrap:wrap}
.logo{display:flex;align-items:baseline;gap:8px}
.logo b{font-size:1.5rem;color:var(--brand);letter-spacing:-.5px}
.logo span{color:var(--muted);font-size:.85rem}
.topbar .spacer{flex:1}
.timerbox{font-variant-numeric:tabular-nums;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:6px 14px;font-weight:700;font-size:1.05rem;display:none}
.timerbox.warn{color:var(--bad);border-color:var(--bad)}
.themebtn{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:6px 12px;color:var(--ink)}

/* nav */
.nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.nav button{background:var(--surface);border:1px solid var(--line);color:var(--ink);padding:9px 16px;border-radius:999px;font-size:.95rem;font-weight:600}
.nav button.active{background:var(--brand);color:var(--brand-ink);border-color:var(--brand)}
.nav button .dot{display:inline-block;min-width:20px;padding:0 5px;border-radius:999px;background:var(--bad);color:#fff;font-size:.75rem;text-align:center;margin-right:6px;font-variant-numeric:tabular-nums}

/* cards & general */
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.card h2{margin:0 0 6px;font-size:1.2rem}
.card h3{margin:0 0 8px;font-size:1.05rem}
.sub{color:var(--muted);font-size:.9rem;margin:0 0 12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:700px){.grid2,.grid4{grid-template-columns:1fr 1fr}}
@media(max-width:440px){.grid4{grid-template-columns:1fr 1fr}}
.stat{background:var(--surface2);border-radius:12px;padding:12px 14px;text-align:center}
.stat b{display:block;font-size:1.5rem;font-variant-numeric:tabular-nums;color:var(--brand)}
.stat span{font-size:.8rem;color:var(--muted)}
.btn{background:var(--brand);color:var(--brand-ink);border:none;border-radius:10px;padding:11px 22px;font-size:1rem;font-weight:700}
.btn.secondary{background:var(--surface2);color:var(--ink);border:1px solid var(--line)}
.btn.accent{background:var(--accent);color:#221503}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.chip{display:inline-block;background:var(--brand-soft);color:var(--brand);border-radius:999px;padding:2px 12px;font-size:.8rem;font-weight:700}
.chip.acc{background:var(--accent-soft);color:var(--accent)}
.tag{font-size:.75rem;color:var(--muted)}

/* question */
.qmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.passage{background:var(--surface2);border-radius:12px;padding:16px 18px;margin-bottom:14px;font-size:1rem;line-height:1.8;max-height:340px;overflow-y:auto}
.qtext{font-size:1.12rem;font-weight:600;margin:0 0 16px;line-height:1.7}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;gap:12px;align-items:flex-start;background:var(--surface2);border:2px solid transparent;border-radius:12px;padding:12px 14px;text-align:left;direction:ltr;font-family:Georgia,serif;font-size:1.02rem;color:var(--ink);width:100%}
.opt .letter{font-weight:700;color:var(--brand);min-width:22px}
.opt:hover{border-color:var(--brand)}
.opt.sel{border-color:var(--brand);background:var(--brand-soft)}
.opt.correct{border-color:var(--good);background:var(--good-soft)}
.opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
.opt:disabled{cursor:default}
.explain{border-radius:12px;padding:14px 16px;margin-top:14px;font-size:.98rem;line-height:1.8;animation:fadein .25s ease}
.explain.good{background:var(--good-soft);border-right:4px solid var(--good)}
.explain.bad{background:var(--bad-soft);border-right:4px solid var(--bad)}
.explain .verdict{font-weight:800;margin-bottom:4px}
.explain .rulelink{margin-top:8px}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.progressbar{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin:8px 0 16px}
.progressbar i{display:block;height:100%;background:var(--brand);border-radius:99px;transition:width .3s}

/* listening */
.ttsbox{display:flex;align-items:center;gap:12px;background:var(--accent-soft);border-radius:12px;padding:12px 16px;margin-bottom:14px;flex-wrap:wrap}
.ttsbox .btn{padding:8px 18px}

/* skill bars */
.skillrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line)}
.skillrow:last-child{border-bottom:none}
.skillrow .nm{flex:1;font-weight:600;font-size:.95rem}
.skillrow .bar{flex:2;height:10px;background:var(--surface2);border-radius:99px;overflow:hidden}
.skillrow .bar i{display:block;height:100%;border-radius:99px}
.skillrow .pct{font-variant-numeric:tabular-nums;min-width:52px;text-align:left;font-weight:700;font-size:.9rem}
.skillrow .fix{background:var(--accent);color:#221503;border:none;border-radius:8px;padding:4px 12px;font-size:.8rem;font-weight:700}
.weakflag{color:var(--bad);font-weight:700}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(10,20,18,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:var(--surface);border-radius:16px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;padding:24px;direction:rtl}
.modal h3{color:var(--brand);margin-top:0}
.modal .lesson{background:var(--surface2);border-radius:12px;padding:14px 16px;line-height:1.9;font-size:.97rem}
.modal .yt{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.modal .yt a{display:flex;align-items:center;gap:10px;background:var(--bad-soft);color:var(--ink);text-decoration:none;border-radius:10px;padding:10px 14px;font-weight:600;font-size:.92rem}
.modal .yt a:hover{filter:brightness(.96)}
.ytico{background:#E53; color:#fff;border-radius:6px;padding:1px 8px;font-size:.75rem;font-weight:800}
.example{direction:ltr;text-align:left;font-family:Georgia,serif;background:var(--surface);border-radius:8px;padding:6px 12px;margin:6px 0;border:1px solid var(--line)}

/* results */
.scorehero{text-align:center;padding:26px 16px}
.scorehero .big{font-size:3.2rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--brand);line-height:1.1}
.scorehero.failing .big{color:var(--bad)}
.review-item{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.review-item.ok{border-right:5px solid var(--good)}
.review-item.no{border-right:5px solid var(--bad)}
footer{margin-top:40px;color:var(--muted);font-size:.8rem;text-align:center}
.setupopts{display:flex;gap:10px;flex-wrap:wrap}
.setupopts button{background:var(--surface2);border:2px solid transparent;border-radius:10px;padding:10px 18px;font-weight:600;color:var(--ink)}
.setupopts button.sel{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
.notice{background:var(--accent-soft);border-radius:10px;padding:10px 14px;font-size:.9rem;margin-bottom:12px}

/* analysis dashboard */
.gaugegrid{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:center}
@media(max-width:680px){.gaugegrid{grid-template-columns:1fr}}
.narr{font-size:.98rem;line-height:2}
.narr b{color:var(--brand)}
.insight{display:flex;gap:10px;background:var(--surface2);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:.93rem;line-height:1.75;align-items:flex-start}
.insight .ico{font-size:1.1rem}
.stchip{font-size:.72rem;font-weight:800;border-radius:999px;padding:2px 10px;color:#fff;white-space:nowrap}
.rank{min-width:30px;height:30px;border-radius:50%;background:var(--brand);color:var(--brand-ink);display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.prio{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;flex-wrap:wrap}
.prio .nm{flex:1;min-width:160px}
.reporttxt{width:100%;min-height:240px;direction:rtl;font-family:Consolas,monospace;font-size:.8rem;background:var(--surface2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px;white-space:pre;overflow:auto}
.radarbox{display:flex;justify-content:center}
.radarbox svg{max-width:280px;width:100%;height:auto}
.lmet{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:560px){.lmet{grid-template-columns:1fr}}

/* exam shell — طبق واجهة المحاكي المحوسب: ثيم فاتح ثابت عمدًا مثل قاعة الاختبار */
.xshell{background:#fff;border:1px solid #C8D2DB;border-radius:12px;overflow:hidden;box-shadow:var(--shadow);color:#1C2733}
.xhdr{direction:ltr;display:flex;align-items:center;gap:14px;background:#01589b;color:#fff;padding:10px 18px;flex-wrap:wrap}
.xhdr.warn{background:#7A1F14}
.xlogo{background:#fff;color:#01589b;font-weight:800;padding:3px 12px;border-radius:6px;font-size:.85rem;white-space:nowrap}
.xtitle{flex:1;text-align:center;font-weight:700;min-width:140px}
.xtime{text-align:right;font-size:.78rem;line-height:1.5;white-space:nowrap}
.xtime b{font-size:1.08rem;font-variant-numeric:tabular-nums}
.xsub{display:flex;align-items:center;gap:10px;background:#4c9bd1;color:#fff;padding:6px 16px;font-size:.85rem;direction:ltr}
.xsub select{border:none;border-radius:5px;padding:2px 8px;font-family:inherit}
.xmain{direction:ltr;display:grid;grid-template-columns:1fr 1fr;min-height:380px;background:#fff}
.xmain.single{grid-template-columns:1fr}
.xstim{border-right:3px solid #01589b;padding:24px;overflow:auto}
.xq{padding:24px;direction:rtl}
.xqlbl{color:#5A6B7A;font-size:.9rem;margin-bottom:10px}
.xqtext{direction:ltr;text-align:left;font-size:calc(var(--xfs,16px) + 2px);font-weight:600;color:#101820;margin:0 0 18px;line-height:1.65}
.ropts{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.ropt{direction:ltr;text-align:left;display:flex;align-items:flex-start;gap:12px;background:none;border:none;padding:8px;font-size:var(--xfs,16px);color:#101820;cursor:pointer;border-radius:6px;width:100%;transition:none}
.ropt:hover{background:#f4f7f9}
.ropt .rc{width:20px;height:20px;border:1px solid #999;border-radius:50%;position:relative;flex-shrink:0;margin-top:2px;background:#fff}
.ropt.sel{color:#0ea5e9;font-weight:600}
.ropt.sel .rc{border:2px solid #0ea5e9}
.ropt.sel .rc::after{content:"";position:absolute;inset:4px;background:#0ea5e9;border-radius:50%}
.xpassage{font-family:Georgia,serif;text-align:left;line-height:1.85;font-size:var(--xfs,16px);color:#1C2733}
.xinstrpane{direction:ltr;text-align:left;line-height:1.9;font-size:var(--xfs,16px);color:#333F4B}
.xaudio{direction:ltr}
.pexp{margin-top:16px;padding:14px 16px;border-radius:12px;line-height:1.85;font-size:.95rem;animation:fadein .25s ease}
.pexp.good{background:#E3F1E8;border-left:4px solid #2E7D4F}
.pexp.bad{background:#F9E5E2;border-left:4px solid #C0392B}
.pexp .verdict{font-weight:800;margin-bottom:6px;direction:ltr;text-align:left}
.pexp .exp-en{direction:ltr;text-align:left}
.pexp .exp-ar{direction:rtl;text-align:right}
.pbtn2{padding:6px 14px;font-size:.85rem;background:#fff;border:1px solid #C8D2DB;color:#1C2733;border-radius:8px;cursor:pointer;font-family:inherit}
.pbtn2:hover{background:#F0F5FA}
.xinfo{color:#5A6B7A;text-align:center;padding:44px 12px}
.aplayer{display:flex;align-items:center;gap:12px;background:#F2F5F7;border:1px solid #E0E7EC;border-radius:10px;padding:14px 16px}
.aplayer .pp{width:36px;height:36px;border-radius:50%;border:none;background:#01589b;color:#fff;cursor:pointer;flex-shrink:0}
.aplayer .pp:disabled{opacity:.4;cursor:not-allowed}
.aplayer .atime{font-variant-numeric:tabular-nums;color:#5A6B7A;font-size:.85rem;white-space:nowrap}
.aplayer .abar{flex:1;height:5px;background:#C9D4DD;border-radius:99px;overflow:hidden}
.aplayer .abar i{display:block;height:100%;width:0;background:#01589b;transition:width 1s linear}
.aplayer.locked{pointer-events:none;user-select:none;background:#F1F5F9;border-color:#D5DEE6}
.aplayer.locked .pp{background:#01589b}
.aplayer .avol{color:#5A6B7A;flex-shrink:0}
.examaud{max-width:560px}
.aud-cap{margin-top:12px;color:#5A6B7A;font-size:.9rem;line-height:1.75;direction:ltr;text-align:left}
.aud-cap.play{color:#01589b;font-weight:600}
.aud-cap.done{color:#159079;font-weight:600}
.xfoot{direction:ltr;display:flex;background:#01589b;padding:0}
.xrow{display:flex;width:100%;align-items:stretch;flex-wrap:wrap}
.xspacer{flex:1}
.xbtn{background:transparent;color:#fff;border:none;padding:15px 20px;font-weight:700;font-size:.95rem;cursor:pointer;font-family:inherit}
.xbtn:hover{background:rgba(255,255,255,.12)}
.xbtn:disabled{opacity:.35;cursor:not-allowed}
.xbtn.strong{background:#1CB098}
.xbtn.strong:hover{background:#159079}
.xbtn.dim{opacity:.6;font-size:.8rem}
.xbtn.flagged{background:#D98E32;color:#221503}
.xshell .sub,.xshell .tag{color:#5A6B7A}
.xshell h2,.xshell h3{color:#01589b}
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:8px;direction:rtl}
.xshell .qcell{padding:10px 0;text-align:center;border-radius:8px;border:2px solid #C8D2DB;font-weight:700;cursor:pointer;font-variant-numeric:tabular-nums;background:#F2F5F7;color:#1C2733;font-size:.95rem}
.xshell .qcell.ans{background:#E3F1E8;border-color:#2E7D4F}
.xshell .qcell.flag{background:#F9EBD8;border-color:#C67F1E}
.xshell .qcell.cur{outline:3px solid #0ea5e9;outline-offset:1px}
.secintro{text-align:center;padding:36px 16px}
@media(max-width:760px){.xmain{grid-template-columns:1fr}.xstim{border-right:none;border-bottom:3px solid #01589b}}
/* forced exam fullscreen mode */
/* ============ حاوية الجلسة الثابتة: القالب الوحيد لأي صفحة أسئلة ============
   الهيدر والفوتر ثابتان · اللوحة اليسرى ساكنة بتمرير داخلي · اليمين وحده يتمرر */
body.exam-fs{overflow:hidden}
body.exam-fs .topbar,body.exam-fs footer{display:none!important}
body.exam-fs #app{max-width:100%;padding:0;margin:0}
body.exam-fs #view{padding:0;height:100vh;height:100dvh}
body.exam-fs .xshell{border-radius:0;border:none;height:100vh;height:100dvh;display:flex;flex-direction:column;box-shadow:none;overflow:hidden}
body.exam-fs .xshell .xhdr,body.exam-fs .xshell .xsub,body.exam-fs .xshell .xfoot{flex:0 0 auto}   /* ثابتة */
body.exam-fs .xshell .xmain{flex:1 1 auto;min-height:0}                                            /* تملأ ما بينهما */
body.exam-fs .xstim{overflow-y:auto;max-height:100%}                                               /* يسار: تمرير داخلي مستقل */
body.exam-fs .xshell .xq{overflow-y:auto;max-height:100%}                                          /* يمين: الجزء الوحيد المتمرر */
body.exam-fs .xshell.single .xmain{overflow-y:auto}
/* native fullscreen targets #view only — so the site background never shows */
#view:fullscreen{background:#01589b;padding:0}
#view:-webkit-full-screen{background:#01589b;padding:0}
/* شاشة "أدر جهازك" — اختبار STEP يعتمد الوضع الأفقي */
#rotateNag{display:none;position:fixed;inset:0;z-index:300;background:#01589b;color:#fff;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;gap:14px}
#rotateNag .ic{font-size:3rem;animation:rothint 1.6s ease-in-out infinite}
@keyframes rothint{0%,100%{transform:rotate(0)}50%{transform:rotate(-90deg)}}
@media (max-width:1000px) and (orientation:portrait){ body.exam-fs #rotateNag{display:flex} body.exam-fs .xshell{visibility:hidden} }
.fs-overlay{position:fixed;inset:0;background:rgba(18,58,94,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:#fff;text-align:center;gap:16px;direction:rtl}
.fs-overlay h2{font-size:1.4rem;margin:0}
.fs-overlay p{color:rgba(255,255,255,.6);max-width:420px;line-height:1.7;font-size:.93rem}
.fs-overlay .fsbtn{background:#0ea5e9;color:#fff;border:none;border-radius:10px;padding:14px 32px;font-size:1.05rem;font-weight:700;cursor:pointer}
.fs-overlay .fsbtn:hover{background:#2468A8}
.fs-overlay .exit-link{color:rgba(255,255,255,.15);font-size:.6rem;text-decoration:none;cursor:pointer;border:none;background:none;margin-top:50px;font-family:inherit}
.fs-overlay .exit-link:hover{color:rgba(255,255,255,.4)}
.xdelbtn{background:none;border:none;color:#C0392B;font-size:1.1rem;cursor:pointer;padding:2px 8px;border-radius:6px;opacity:.6;transition:opacity .2s}
.xdelbtn:hover{opacity:1;background:var(--bad-soft)}
.delallbtn{background:var(--bad-soft);color:var(--bad);border:1px solid var(--bad);border-radius:8px;padding:6px 14px;font-size:.85rem;font-weight:600;cursor:pointer}
.delallbtn:hover{background:var(--bad);color:#fff}
.xfsbtn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;width:34px;height:34px;font-size:1rem;cursor:pointer;flex-shrink:0}
.xfsbtn:hover{background:rgba(255,255,255,.28)}
.xfsbtn.on{background:#0ea5e9}
/* واجهة التدريب أوسع (بدون ملء شاشة) */
body.practice-mode #app{max-width:1500px}
body.practice-mode .topbar,body.practice-mode footer{max-width:960px;margin-left:auto;margin-right:auto}
/* صف اختبار قابل للنقر في السجل */
.exrow{cursor:pointer;border-radius:10px;transition:background .15s}
.exrow:hover{background:var(--surface2)}

{id:"w6",sec:"write",skill:"punct",q:"Which sentence uses punctuation correctly?",
 opts:["He was late however he finished the test.","He was late, however, he finished the test","He was late; however, he finished the test.","He was late however, he finished the test."],ans:2,
 exp:"<b>however</b> بين جملتين كاملتين تحتاج: فاصلة منقوطة قبلها + فاصلة بعدها: <b>; however,</b>",
 trap:{1:"الفاصلة وحدها قبل however لا تكفي لربط جملتين كاملتين (comma splice)، والجملة بلا نقطة نهائية."}},
{id:"w7",sec:"write",skill:"order",q:"Which sentence is the best <b>topic sentence</b> to begin a paragraph?",
 opts:["This is why he decided to leave.","Regular exercise improves both physical and mental health.","For example, swimming burns many calories.","In conclusion, sports are useful."],ans:1,
 exp:"الجملة الرئيسية تقدم فكرة عامة تصلح أن تتفرع عنها تفاصيل. لا تبدأ الفقرة بضمير غامض (This) ولا بمثال (For example) ولا بخاتمة (In conclusion).",
 trap:{0:"This ضمير يشير لشيء سابق غير موجود — لا تبدأ به فقرة.",2:"For example تقدم تفصيلة داعمة، مكانها وسط الفقرة لا أولها."}},
{id:"w8",sec:"write",skill:"order",q:"Put the steps in the correct order:<br>1. Finally, pour the tea into a cup.<br>2. First, boil some water.<br>3. Then, add the tea leaves.<br>4. After that, let it sit for three minutes.",
 opts:["2 → 3 → 4 → 1","1 → 2 → 3 → 4","2 → 4 → 3 → 1","3 → 2 → 1 → 4"],ans:0,
 exp:"تتبع كلمات التسلسل: <b>First</b> (اغلِ الماء) → <b>Then</b> (أضف الشاي) → <b>After that</b> (انتظر) → <b>Finally</b> (اسكب). كلمات الترتيب هي مفتاحك دائمًا.",
 trap:{2:"لا يمكن ترك الشاي «ينقع» (4) قبل إضافة أوراق الشاي (3)!"}},
{id:"w9",sec:"write",skill:"order",q:"Which sentence does <b>NOT</b> belong in this paragraph?<br><i>\"Honey has many health benefits. (1) It soothes sore throats. (2) It gives the body quick energy. (3) Bees live in large groups called colonies. (4) It also helps heal small wounds.\"</i>",
 opts:["Sentence 1","Sentence 2","Sentence 3","Sentence 4"],ans:2,
 exp:"الفقرة عن <b>فوائد العسل الصحية</b> — جملة (3) عن حياة النحل الاجتماعية، معلومة صحيحة لكنها خارج موضوع الفقرة (تكسر وحدة الفقرة unity).",
 trap:{3:"جملة 4 فائدة صحية للعسل فهي ضمن الموضوع."}},
{id:"w10",sec:"write",skill:"best",q:"Choose the best way to combine:<br>\"He was very sick.\" + \"He went to school.\"",
 opts:["He was very sick, so he went to school.","Although he was very sick, he went to school.","He was very sick because he went to school.","He was very sick, he went to school."],ans:1,
 exp:"العلاقة بين الجملتين <b>تناقض</b> (مريض ← ومع ذلك ذهب) = Although. so تعني نتيجة منطقية وbecause سبب، وكلاهما يناقض المعنى.",
 trap:{0:"so تجعل الذهاب للمدرسة نتيجة طبيعية للمرض — غير منطقي.",3:"ربط جملتين بفاصلة فقط خطأ يسمى comma splice."}},
{id:"w11",sec:"write",skill:"best",q:"Choose the clearest and most concise sentence:",
 opts:["In my personal opinion, I think that the book is interesting.","The book, which is a book that I read, is interesting.","I found the book interesting.","The book is a thing that has the quality of being interesting to me."],ans:2,
 exp:"أفضل جملة = أوضح معنى بأقل كلمات بلا تكرار. «In my opinion, I think» تكرار (الرأي = ما تظنه)، والخيارات الأخرى مليئة بالحشو.",
 trap:{0:"In my opinion و I think بمعنى واحد — الجمع بينهما حشو."}},
{id:"w12",sec:"write",skill:"punct",q:"Which sentence is capitalized correctly?",
 opts:["We study english every monday in march.","We study English every Monday in March.","We Study English Every Monday In March.","We study English every monday in March."],ans:1,
 exp:"اللغات (English) والأيام (Monday) والشهور (March) تبدأ بحرف كبير دائمًا — أما بقية كلمات الجملة فلا تُكبَّر.",
 trap:{3:"قريبة! لكن أيام الأسبوع تُكبَّر أيضًا: Monday."}},
/* ===== READING ===== */
{id:"r1",sec:"read",skill:"main",pid:"p1",q:"What is the main idea of the passage?",
 opts:["Camels can drink 100 liters of water quickly.","Camel racing is a popular modern sport.","Camels have been, and still are, important in Arabian life.","Modern transport is better than camels."],ans:2,
 exp:"النص كله يدور حول أهمية الإبل قديمًا (النقل) وحديثًا (رمز التراث والسباقات). الفكرة الرئيسية تغطي النص كاملًا لا جزءًا منه.",
 trap:{0:"معلومة صحيحة لكنها تفصيلة واحدة فقط — الفكرة الرئيسية أوسع.",1:"السباقات ذُكرت في جملة واحدة أخيرة فقط."}},
{id:"r2",sec:"read",skill:"detail",pid:"p1",q:"According to the passage, how much water can a camel drink in ten minutes?",
 opts:["Up to 10 liters","Up to 100 liters","Up to 176 liters","Two weeks' worth"],ans:1,
 exp:"سؤال تفاصيل — الإجابة نص مكتوب: «drink up to 100 liters of water in just ten minutes». ابحث عن الرقم في النص بتقنية scanning.",
 trap:{3:"الأسبوعان مدة بقائه بلا ماء، وليست كمية الشرب — انتبه لخلط التفاصيل."}},
{id:"r3",sec:"read",skill:"ref",pid:"p1",q:'In the passage, the word "they" in "they carried travelers and goods" refers to:',
 opts:["the travelers","the deserts","the camels","the ships"],ans:2,
 exp:"الضمير they يعود على أقرب اسم جمع منطقي قبله وهو camels — جرّب الاستبدال: «الجمال حملت المسافرين» يستقيم المعنى.",
 trap:{3:"«ships of the desert» مجرد تشبيه للجمال، وليست سفنًا حقيقية."}},
{id:"r4",sec:"read",skill:"vocab",pid:"p1",q:'The word "heritage" in the passage is closest in meaning to:',
 opts:["transport","cultural tradition","money","racing"],ans:1,
 exp:"السياق: «رمز فخر للـ heritage» بعد الحديث عن تاريخ الإبل الطويل — فالمعنى الأقرب هو التراث/الموروث الثقافي.",
 trap:{3:"السباقات مثال على الاحتفاء بالتراث، وليست معنى الكلمة نفسها."}},
{id:"r5",sec:"read",skill:"infer",pid:"p1",q:"What can be inferred from the passage?",
 opts:["Camels are no longer valuable in Saudi Arabia.","Some people are willing to pay very high prices for camels.","Camel racing is older than camel transport.","Camels need water every day."],ans:1,
 exp:"النص يقول إن الجمل الفائز «يُباع بملايين الريالات» — نستنتج أن هناك من يدفع مبالغ ضخمة. الاستنتاج الصحيح عليه دليل نصي دائمًا.",
 trap:{0:"العكس — النص يؤكد بقاء قيمتها رمزًا وسباقات.",3:"النص يقول إنها تصبر أسبوعين بلا ماء."}},
{id:"r6",sec:"read",skill:"main",pid:"p2",q:"What is the passage mainly about?",
 opts:["Why phones are bad for teenagers.","The importance of sleep for students' learning.","How to score higher on exams.","An experiment about studying."],ans:1,
 exp:"كل فقرات النص تخدم فكرة واحدة: قلة النوم تضر التركيز والتحصيل. الجوال والتجربة مجرد تفاصيل داعمة.",
 trap:{0:"الجوال ذُكر كأحد الأسباب فقط — الموضوع الأشمل هو النوم."}},
{id:"r7",sec:"read",skill:"detail",pid:"p2",q:"How many hours of sleep do teenagers need according to the passage?",
 opts:["Six to eight hours","Eight to ten hours","Ten to twelve hours","At least five hours"],ans:1,
 exp:"مكتوبة نصًا: «teenagers need eight to ten hours of sleep every night».",},
{id:"r8",sec:"read",skill:"infer",pid:"p2",q:"What can be inferred about studying all night before an exam?",
 opts:["It is the best way to prepare.","It helps memory.","It may lower your exam score.","Teachers recommend it."],ans:2,
 exp:"التجربة في النص: من ناموا جيدًا «تفوقوا» على من سهروا — إذن السهر للمذاكرة قد يخفض درجتك. وهذه نصيحة حقيقية لك قبل ستيب!",
 trap:{0:"النص يثبت العكس بالتجربة."}},
{id:"r9",sec:"read",skill:"vocab",pid:"p2",q:'The word "delays" in the last sentence is closest in meaning to:',
 opts:["makes late","improves","strengthens","begins"],ans:0,
 exp:"السياق: الضوء الأزرق «delays» إشارات النوم — أي يؤخرها، ولهذا ينصحون بإبعاد الجوال. delay = يؤخر.",
 trap:{1:"لو كان الضوء يحسّن النوم لما نصحوا بإبعاد الجوال قبل النوم!"}},
{id:"r10",sec:"read",skill:"detail",pid:"p2",q:"What do experts recommend before bed?",
 opts:["Studying for one hour","Drinking coffee","Putting phones away an hour before sleeping","Waking up early"],ans:2,
 exp:"مكتوبة نصًا في الجملة الأخيرة: «putting phones away at least one hour before bed».",},
{id:"r11",sec:"read",skill:"detail",pid:"p3",q:"According to the story, where was coffee first discovered?",
 opts:["Yemen","Makkah","Istanbul","Ethiopia"],ans:3,
 exp:"النص: «coffee was first discovered in Ethiopia». اليمن كانت المحطة الثانية حيث أُعدّ كمشروب ساخن أول مرة.",
 trap:{0:"اليمن أول من «شربه مشروبًا ساخنًا»، لكن الاكتشاف الأول كان في إثيوبيا — فرّق بين التفصيلتين."}},
{id:"r12",sec:"read",skill:"main",pid:"p3",q:"What is the best title for this passage?",
 opts:["Kaldi and His Goats","The Journey of Coffee Through History","How to Make Arabic Coffee","Coffee Houses in Istanbul"],ans:1,
 exp:"العنوان الأفضل يلخص النص كله: رحلة القهوة من إثيوبيا لليمن للعالم حتى اليوم. بقية الخيارات تفاصيل جزئية.",
 trap:{0:"قصة كالدي مجرد بداية النص وليست موضوعه كله."}},
{id:"r13",sec:"read",skill:"detail",pid:"p3",q:"Why did people in Yemen first drink coffee?",
 opts:["To welcome guests","To stay awake during long nights of prayer","To sell it in coffee houses","Because their goats liked it"],ans:1,
 exp:"مكتوبة نصًا: «to stay awake during long nights of prayer».",},
{id:"r14",sec:"read",skill:"vocab",pid:"p3",q:'The word "hospitality" is closest in meaning to:',
 opts:["cooking skill","hospital care","generous welcoming of guests","drinking coffee"],ans:2,
 exp:"السياق: القهوة العربية «تُقدَّم للضيوف» كرمز للكرم والـ hospitality = حسن الضيافة واستقبال الضيوف.",
 trap:{1:"فخ الشكل! hospitality لا علاقة لها بالمستشفى hospital رغم التشابه."}},
{id:"r15",sec:"read",skill:"infer",pid:"p3",q:"What can be inferred about coffee houses in the sixteenth century?",
 opts:["They served only Arabic coffee.","They were social places where people gathered.","They were found only in Ethiopia.","They were unpopular."],ans:1,
 exp:"النص يصفها بأنها «popular places to meet and talk» — نستنتج أنها كانت أماكن اجتماعية للتجمع.",},
{id:"r16",sec:"read",skill:"detail",pid:"p4",q:"How many lines does the Riyadh Metro have?",
 opts:["Four","Six","Eight","Eighty-five"],ans:1,
 exp:"مكتوبة نصًا: «Its six lines cover 176 kilometers». الـ 85 هو عدد المحطات — انتبه لتشابه الأرقام.",
 trap:{3:"85 عدد المحطات وليس الخطوط."}},
{id:"r17",sec:"read",skill:"main",pid:"p4",q:"What is the main purpose of the passage?",
 opts:["To describe the Riyadh Metro project and its goals.","To compare trains and cars.","To explain how computers drive trains.","To encourage tourism in Riyadh."],ans:0,
 exp:"النص يعرّف بالمشروع: حجمه، أهدافه (تخفيف الزحام والتلوث)، ومميزاته — وصف شامل للمشروع.",
 trap:{2:"القيادة الآلية تفصيلة واحدة من النص."}},
{id:"r18",sec:"read",skill:"infer",pid:"p4",q:"What do city officials expect to happen in the future?",
 opts:["Ticket prices will rise.","More lines will be built.","Fewer people will drive their cars daily.","Trains will get faster."],ans:2,
 exp:"النص: المسؤولون يتوقعون أن «يترك مئات الآلاف سياراتهم» ويستخدموا المترو — أي انخفاض قيادة السيارات.",
 trap:{1:"لم يذكر النص خططًا لخطوط جديدة — لا تستنتج بلا دليل نصي."}},
{id:"r19",sec:"read",skill:"vocab",pid:"p4",q:'The word "congestion" is closest in meaning to:',
 opts:["pollution","heavy traffic","construction","speed"],ans:1,
 exp:"السياق يساعدك: «traffic congestion on the city's crowded roads» — الطرق المزدحمة = الازدحام المروري.",
 trap:{0:"التلوث ذُكر هدفًا منفصلًا بعده (cutting air pollution) فهو معنى آخر."}},
{id:"r20",sec:"read",skill:"detail",pid:"p4",q:"Who controls the metro trains?",
 opts:["Trained drivers","City officials","Passengers","A central computer system"],ans:3,
 exp:"مكتوبة نصًا: «fully automatic and driverless, controlled by a central computer system».",},
{id:"r21",sec:"read",skill:"main",pid:"p5",q:"What is the main idea of the passage?",
 opts:["Honey is a healthy food.","Bees are essential for producing much of our food.","Pesticides should be banned.","Gardens need more flowers."],ans:1,
 exp:"الفكرة الجامعة: أهمية النحل تتجاوز العسل — ثلث غذائنا يعتمد على تلقيحه للنباتات، وحمايته حماية لغذائنا.",
 trap:{0:"النص صرّح بالعكس: أهمية النحل «ليست بسبب العسل»!"}},
{id:"r22",sec:"read",skill:"detail",pid:"p5",q:"How much of human food depends on pollination?",
 opts:["About one third","About one half","Almost all","Very little"],ans:0,
 exp:"مكتوبة نصًا: «about one third of the food humans eat depends on this process».",},
{id:"r23",sec:"read",skill:"detail",pid:"p5",q:"According to the passage, why are bee numbers falling?",
 opts:["Because of honey collection","Because of chemical pesticides and loss of wild flowers","Because of cold weather","Because of new diseases"],ans:1,
 exp:"مكتوبة نصًا: «because of chemical pesticides and the loss of wild flowers».",},
{id:"r24",sec:"read",skill:"ref",pid:"p5",q:'The word "They" in "They encourage people to plant flowers" refers to:',
 opts:["the bees","the flowers","the experts","the chemicals"],ans:2,
 exp:"جرّب الاستبدال: «الخبراء يشجعون الناس على زراعة الزهور» — المعنى يستقيم مع experts المذكورة في الجملة السابقة.",
 trap:{0:"النحل لا «يشجع الناس» — الضمير يحتاج فاعلًا عاقلًا منطقيًا."}},
{id:"r25",sec:"read",skill:"infer",pid:"p5",q:'What does the writer mean by "protecting bees is protecting our own food supply"?',
 opts:["Bees guard food storage.","If bees disappear, much of our food will too.","People should eat more honey.","Food factories need bees."],ans:1,
 exp:"استنتاج من مجمل النص: بما أن ثلث الغذاء يعتمد على تلقيح النحل، فاختفاؤه يهدد غذاءنا — لذا حمايته حماية لنا.",},

/* ===== LISTENING (TTS) ===== */
{id:"l1",sec:"listen",skill:"ldetail",tts:"Attention all passengers. Flight two two six to Jeddah will now depart from Gate fourteen, instead of Gate nine. Boarding begins at seven thirty. Thank you.",
 q:"Which gate will the flight to Jeddah depart from?",opts:["Gate 9","Gate 14","Gate 26","Gate 7"],ans:1,
 exp:"الإعلان قال: «will now depart from Gate fourteen, instead of Gate nine» — البوابة الجديدة 14، ورقم 9 هو القديم. كلمة instead of (بدلًا من) هي المفتاح.",
 trap:{0:"البوابة 9 هي القديمة الملغاة — انتبه لكلمة instead of.",2:"26 رقم الرحلة وليس البوابة."}},
{id:"l2",sec:"listen",skill:"ldetail",tts:"Good evening! What would you like to order? | I'll have the grilled chicken with rice, and a fresh lemon juice, please. | Anything else? | No, thank you.",
 q:"What did the man order to drink?",opts:["Orange juice","Water","Lemon juice","Tea"],ans:2,
 exp:"قال الرجل: «and a fresh lemon juice, please». اقرأ الخيارات قبل التشغيل حتى تعرف أنك تنتظر اسم مشروب.",},
{id:"l3",sec:"listen",skill:"lmain",tts:"Good morning, Doctor Salem's clinic. How can I help you? | Hi, I would like to book an appointment. I've had back pain for a week. | We have an opening on Tuesday at four p m. | Tuesday works. Thank you so much.",
 q:"Why did the man call the clinic?",opts:["To cancel an appointment","To book an appointment for back pain","To ask about the doctor's name","To get test results"],ans:1,
 exp:"الغرض ظهر في أول جملة قالها المتصل: «I would like to book an appointment» بسبب ألم الظهر. أول جملة من المتحدث غالبًا تكشف هدف المكالمة.",},
{id:"l4",sec:"listen",skill:"ldetail",tts:"And now, the weather. Tomorrow will be sunny in the morning, but expect heavy rain and strong winds in the evening. Temperatures will drop to twelve degrees at night.",
 q:"What will the weather be like in the evening?",opts:["Sunny","Heavy rain and strong winds","Snowy","Hot and dry"],ans:1,
 exp:"النشرة قسمت اليوم: صباحًا مشمس «لكن» مساءً أمطار غزيرة ورياح قوية. كلمة but تنبهك أن ما بعدها يخالف ما قبلها.",
 trap:{0:"المشمس للصباح — السؤال عن المساء."}},
{id:"l5",sec:"listen",skill:"ldetail",tts:"Don't forget, everyone. Your research papers are due on Thursday, not Friday as I said before. Please email me if you have any questions.",
 q:"When must the students submit their papers?",opts:["Friday","Monday","Thursday","Today"],ans:2,
 exp:"المعلم صحح الموعد: «due on Thursday, not Friday» — الخميس هو الموعد، والجمعة كانت الخطأ السابق. صيغة X, not Y فخ متكرر في المسموع.",
 trap:{0:"الجمعة هي التي نفاها المتحدث بكلمة not."}},
{id:"l6",sec:"listen",skill:"lmain",tts:"Al Salam Hotel, how can I help you? | Hello! Do you have a room available for two nights this weekend? | Yes, we do. A double room is four hundred riyals per night. | Great, I would like to book it, please.",
 q:"What is the purpose of this phone call?",opts:["Complaining about a room","Asking for directions","Booking a hotel room","Cancelling a reservation"],ans:2,
 exp:"السياق كله حجز: سأل عن غرفة متاحة ثم قال «I would like to book it». حدد هدف المكالمة من مجمل الحوار لا من كلمة واحدة.",},
{id:"l7",sec:"listen",skill:"linfer",tts:"Excuse me, I bought this shirt yesterday, but it's too small. | Do you have the receipt? | Yes, here it is. | No problem. You can exchange it for a larger size.",
 q:"Where does this conversation most likely take place?",opts:["In a restaurant","In a clothing store","At a hospital","At school"],ans:1,
 exp:"استنتاج من المفردات: shirt (قميص)، receipt (فاتورة)، exchange for a larger size (استبدال بمقاس أكبر) — كلها تدل على متجر ملابس.",},
{id:"l8",sec:"listen",skill:"ldetail",tts:"Excuse me, where is the public library? | Go straight ahead, then turn left at the bank. The library is right next to the post office. | Thank you very much!",
 q:"Where is the library located?",opts:["Next to the bank","Inside the mall","Next to the post office","Behind the school"],ans:2,
 exp:"قال: «right next to the post office». البنك مذكور كنقطة انعطاف فقط (turn left at the bank) — لا تخلط بين المعلومتين.",
 trap:{0:"البنك مكان الانعطاف يسارًا، وليس موقع المكتبة."}},
{id:"l9",sec:"listen",skill:"ldetail",tts:"Hey Omar, do you want to watch the new movie tonight? | Sure! What time does it start? | It starts at nine, so let's meet at eight thirty at the mall entrance. | Perfect, see you there.",
 q:"What time will they meet?",opts:["At 9:00","At 8:30","At 8:00","At 9:30"],ans:1,
 exp:"الفيلم يبدأ 9:00 لكن الاتفاق «let's meet at eight thirty» أي 8:30. السؤال عن موعد اللقاء لا موعد الفيلم — ركز على المطلوب بالضبط.",
 trap:{0:"9:00 موعد بداية الفيلم، وليس موعد لقائهما."}},
{id:"l10",sec:"listen",skill:"lmain",tts:"Dear customers, may I have your attention please. The store will close in fifteen minutes. Please take your final purchases to the cashier. Thank you for shopping with us.",
 q:"What is this announcement about?",opts:["A special discount","The store is closing soon","A lost child","A new product"],ans:1,
 exp:"الجملة المركزية: «The store will close in fifteen minutes» وما بعدها (توجهوا للكاشير) يؤكد أن الإعلان عن قرب الإغلاق.",},
{id:"l11",sec:"listen",skill:"linfer",tts:"Where to, sir? | King Khalid Airport, please. And hurry, my flight leaves in an hour! | Don't worry, we will be there in twenty minutes.",
 q:"Who are the two speakers?",opts:["A pilot and a passenger","A taxi driver and a passenger","Two friends","A teacher and a student"],ans:1,
 exp:"استنتاج: «?Where to» سؤال سائق التاكسي المعتاد، والراكب يطلب الوصول للمطار — العلاقة سائق وراكب. الطيار لا يسألك إلى أين تريد الذهاب!",

{id:"l12",sec:"listen",skill:"ldetail",tts:"Good morning! I'd like to ask about your gym membership. | Sure. The monthly plan is two hundred riyals, and the yearly plan is one thousand eight hundred riyals. | I think I'll take the monthly one for now.",
 q:"How much does the monthly plan cost?",opts:["1800 riyals","200 riyals","280 riyals","100 riyals"],ans:1,
 exp:"«The monthly plan is two hundred riyals» = 200 ريال شهريًا. الـ 1800 سعر الخطة السنوية — اقرأ الخيارات قبل الاستماع لتعرف أن هناك رقمين سيُذكران.",
 trap:{0:"1800 سعر الاشتراك السنوي وليس الشهري."}},

{id:"la9_3",sec:"listen",skill:"linfer",aid:"la9",audio:"listening/1742938851.mp3",

{"id":"nq_1","sec":"gram","skill":"pronouns","q":"My sister's name is Anna. ...... is eight years old.","opts":["He","Him","She","Her"],"ans":2,"exp":"Anna اسم أنثى، فنحتاج ضمير فاعل مؤنث She."},
{"id":"nq_2","sec":"gram","skill":"compare","q":"Russia is ...... than Canada.","opts":["bigger","the bigger","biggest","the biggest"],"ans":0,"exp":"لوجود than نستخدم صيغة المقارنة بإضافة er للصفة القصيرة bigger."},
{"id":"nq_3","sec":"gram","skill":"gerund","q":"He went to university in the UK ...... a PhD in physics.","opts":["get","getting","to get","to getting"],"ans":2,"exp":"لبيان الغرض (لكي يحصل على) نستخدم to + المصدر."},
{"id":"nq_4","sec":"gram","skill":"gerund","q":"In my opinion, it is not economical ........ your money on cheap, poor-quality products.","opts":["spend","spent","to spend","be spending"],"ans":2,"exp":"بعد الصفات (economical) نستخدم to + المصدر."},
{"id":"nq_5","sec":"gram","skill":"quantifiers","q":"The computer costs so ........ money that the family decided not to buy it.","opts":["most","more","many","much"],"ans":3,"exp":"money اسم غير معدود، فيأخذ much وليس many."},
{"id":"nq_6","sec":"gram","skill":"tenses","q":"Go outside and ......... the gardener some water. He needs a break.","opts":["bring","to bring","bringing","will bring"],"ans":0,"exp":"الجملة أمرية (Imperative) معطوفة على Go، فيأتي الفعل في المصدر bring."},
{"id":"nq_7","sec":"write","skill":"punct","q":"In which sentence is all CAPITALIZATION correct?","opts":["Running late, he yelled, \"Stop!\" as he chased after the kingdom university bus that took him to work every morning.","Running late, he yelled, \"Stop!\" as he chased after the Kingdom university bus that took him to work every morning.","Running late, he yelled, \"Stop!\" as he chased after the Kingdom University bus that took him to work every morning.","Running late, He yelled, \"Stop!\" as he chased after the Kingdom University bus that took him to work every morning."],"ans":2,"exp":"أسماء الجامعات (Kingdom University) يجب أن تُكتب بحروف كبيرة."},
{"id":"nq_8","sec":"write","skill":"punct","q":"In which sentence is all CAPITALIZATION correct?","opts":["Among John's favorite places to travel were malaysia, morocco, and any exotic location with a nice, clean beach.","Among John's favorite places to travel were Malaysia, Morocco, and any Exotic Location with a nice, clean beach.","Among John's favorite places to travel were Malaysia, Morocco, and any exotic location with a nice, clean beach.","Among John's favorite Places to Travel were Malaysia, Morocco, and any exotic location with a nice, clean beach."],"ans":2,"exp":"أسماء الدول (Malaysia, Morocco) بحروف كبيرة، والكلمات العامة (exotic location) بحروف صغيرة."},
{"id":"nq_9","sec":"write","skill":"order","q":"Which sentence has the CORRECT WORD ORDER?","opts":["And then they would start getting ready for bed, after eating dinner, the family used to read books while drinking tea.","After eating dinner, the family used to read books while drinking tea, and then they would start getting ready for bed.","After eating dinner, and then they would start getting ready for bed, the family used to read books while drinking tea.","The family used to read books while drinking tea, and then they would start getting ready, after eating dinner, for bed."],"ans":1,"exp":"الترتيب المنطقي: ظرف الزمان (After eating) ثم الفاعل والفعل، ثم حدث لاحق (and then)."},
{"id":"nq_10","sec":"gram","skill":"tenses","q":"-May I speak to Mr. Ben please?\n-I'm afraid he ................. an errand right now. Could you call back?","opts":["runs","is running","ran","has run"],"ans":1,"exp":"كلمة right now تدل على المضارع المستمر is running."},
{"id":"nq_11","sec":"gram","skill":"gerund","q":"The students had been studying lesson one and the teacher wanted ................ lesson two.","opts":["begin","to begin","they begin","that they begin"],"ans":1,"exp":"الفعل want يتبعه to + المصدر."},
{"id":"nq_12","sec":"gram","skill":"conj","q":"The boys' mother told them to finish all of their breakfast, ...... they stuffed their mouths until their plates were empty.","opts":["however","since","as","so"],"ans":3,"exp":"النتيجة (لذلك قاموا بحشو أفواههم) تحتاج رابط النتيجة so."},
{"id":"nq_13","sec":"gram","skill":"passive","q":"At tomorrow's event, a large sum of money ...... by an anonymous supporter.","opts":["have donated","will donate","will be donated","are being donated"],"ans":2,"exp":"الجملة مبني للمجهول في المستقبل (tomorrow)، فنستخدم will be + V3."},
{"id":"nq_14","sec":"gram","skill":"svagree","q":"A large box of dates ...... from my uncle.","opts":["have just arrived","has just arrived","having just arrived","just have arrived"],"ans":1,"exp":"الفاعل هو A large box (مفرد) فيأخذ has وليس have."},
{"id":"nq_15","sec":"gram","skill":"tenses","q":"Bob ...... on holiday last year.","opts":["didn't go","didn't went","doesn't go","not go"],"ans":0,"exp":"في الماضي البسيط المنفي نستخدم didn't + المصدر."},
{"id":"nq_16","sec":"write","skill":"order","q":"Which sentence has the CORRECT WORD ORDER?","opts":["He claimed he was simply meditating, but when asked about it later, Adam had obviously fallen asleep while sitting on the couch.","Adam had obviously fallen asleep while sitting on the couch, but when asked about it later, he claimed he was simply meditating.","Adam had obviously fallen asleep while sitting on the couch, he claimed he was simply meditating, but when asked about it later.","While sitting on the couch, but when asked about it later, he claimed he was simply meditating, Adam had obviously fallen asleep."],"ans":1,"exp":"هذا الترتيب يسرد الأحداث تسلسليًا بشكل منطقي ويوضح من هو الفاعل (Adam) قبل استخدام الضمير (he)."},
{"id":"nq_17","sec":"gram","skill":"conj","q":"Steve's watch was not working properly ...... he took it to a repair shop.","opts":["but","so","because","while"],"ans":1,"exp":"لأنه لم يكن يعمل (سبب)، أرسله للتصليح (نتيجة) = so."},
{"id":"nq_18","sec":"write","skill":"order","q":"To which sentence from the paragraph below can we add the following clause?\nSince she was living in Saudi Arabia, ..........................................\n[1] Sarah wanted to learn Arabic.\n[2] To start, she made a flash card for each letter...\n[3] She practiced with the flash cards...\n[4] Then she bought children's books...","opts":["[1]","[2]","[3]","[4]"],"ans":0,"exp":"الجملة تمهد لسبب رغبتها في تعلم اللغة العربية (لأنها كانت تعيش في السعودية)."},
{"id":"nq_19","sec":"write","skill":"order","q":"Which sentence has the CORRECT WORD ORDER?","opts":["Invented by Thomas Edison, was the electric light bulb, one of the many commercially successful products, an essential element of our modern lives.","One of the many commercially successful products, an essential element of our modern lives was invented by Thomas Edison, the electric light bulb.","The electric light bulb, an essential element of our modern lives, was one of the many commercially successful products invented by Thomas Edison.","An essential element of our modern lives, one of the many commercially successful products, was invented the electric light bulb by Thomas Edison."],"ans":2,"exp":"الترتيب الصحيح: الفاعل (The light bulb) + جملة اعتراضية وصفية + الفعل (was)."},
{"id":"nq_20","sec":"write","skill":"error","q":"Which one of the underlined words or phrases in the following is INCORRECT?\nDid you know that the tree over there might actually been hundreds of years old?","opts":["Did","know","there","been"],"ans":3,"exp":"بعد might نستخدم المصدر (be) وليس التصريف الثالث (been)."},
{"id":"nq_21","sec":"write","skill":"order","q":"Which sentence as the CORRECT WORD ORDER?","opts":["Catching ants that were crawling around inside the house, the boys spent the whole afternoon and putting them outside in the garden.","The boys spent the whole afternoon catching ants that were crawling around inside the house and putting them outside in the garden.","Catching ants that were crawling around inside the house and putting them outside in the garden, the boys spent the whole afternoon.","The boys spent the whole afternoon and putting them outside in the garden, catching ants that were crawling around inside the house."],"ans":1,"exp":"التركيب الصحيح: الفاعل (The boys) + الفعل (spent) + الوقت (the whole afternoon) + الفعل المضاف له ing."},
{"id":"nq_22","sec":"write","skill":"error","q":"Which one of the underlined words or phrases is INCORRECT?\nTom and Adam went to play tennis at the sports club hours ago, and still has not returned home for lunch yet.","opts":["to play","ago","has","yet"],"ans":2,"exp":"الفاعل جمع (Tom and Adam) فيجب استخدام have وليس has."},
{"id":"nq_23","sec":"write","skill":"error","q":"Which of the underlined words in the sentence is INCORRECT?\nTo become a doctor and to helping sick children are the goals that Lucy hopes to achieve after she finishes her undergraduate university courses.","opts":["to helping","the goals","hopes","finishes"],"ans":0,"exp":"بعد to نستخدم المصدر (help) وليس (helping)."},
{"id":"nq_24","sec":"gram","skill":"tenses","q":"Working in a university last year ...... very interesting.","opts":["is","was","can be","could be"],"ans":1,"exp":"كلمة last year دالة على الماضي البسيط was."},
{"id":"nq_25","sec":"gram","skill":"conditionals","q":"If I ...... my car back from the mechanic tomorrow, I will travel to Dubai.","opts":["got","get","am getting","will get"],"ans":1,"exp":"حالة if الأولى: If + مضارع بسيط (get)، والطرف الثاني will + المصدر."},
{"id":"nq_26","sec":"write","skill":"wordorder","q":"I do not understand this sentence. What ...........................?","opts":["does mean this word.","does this word mean.","this word means.","D means this word."],"ans":1,"exp":"في تكوين السؤال: أداة الاستفهام + فعل مساعد (does) + الفاعل (this word) + الفعل الأساسي (mean)."},
{"id":"nq_27","sec":"gram","skill":"preps","q":"He worked ............. forty years before he decided to retire.","opts":["for","from","since","during"],"ans":0,"exp":"لبيان طول المدة الزمنية (forty years) نستخدم for."},
{"id":"nq_28","sec":"gram","skill":"tenses","q":"A: The maintenance man was here today.\nB: Good! .......... you remember to tell him to fix the stairs?","opts":["Are","Were","Do","Did"],"ans":3,"exp":"السؤال عن حدث في الماضي (was here today) يتطلب استخدام Did."},
{"id":"nq_29","sec":"gram","skill":"modals","q":"In England, many children ............. wear school uniforms; they can't come to school if they don't.","opts":["have to","must to","need","can"],"ans":0,"exp":"للإلزام الخارجي (قوانين المدرسة) نستخدم have to."},
{"id":"nq_30","sec":"gram","skill":"tenses","q":"That's a beautiful new jacket! Where ......................... you buy it?","opts":["are","were","have","did"],"ans":3,"exp":"السؤال عن عملية الشراء التي حدثت في الماضي يتطلب did."},
{"id":"nq_31","sec":"gram","skill":"tenses","q":"All of your travel plans have been made. When you arrive, someone ............. for you at the airport.","opts":["waits","will wait","is waiting","will be waiting"],"ans":3,"exp":"حدث سيكون مستمرًا في نقطة معينة في المستقبل = مستقبل مستمر will be waiting."},
{"id":"nq_32","sec":"gram","skill":"modals","q":"The children could not ...... out to ride their bikes because it was raining.","opts":["go","going","gone","to go"],"ans":0,"exp":"بعد الأفعال الناقصة (could) يأتي الفعل في المصدر (go)."},
{"id":"nq_33","sec":"gram","skill":"tenses","q":"They went to bed as soon as their guests ........... left.","opts":["are","were","had","have"],"ans":2,"exp":"حدثان في الماضي، الأسبق (مغادرة الضيوف) يأخذ ماضي تام (had left)."},
{"id":"nq_34","sec":"gram","skill":"gerund","q":"Does Chris have to go home now? Let him .......... a while longer.","opts":["stay","stays","to stay","staying"],"ans":0,"exp":"بعد الفعل Let يأتي المفعول به ثم الفعل في المصدر بدون to."},
{"id":"nq_35","sec":"write","skill":"wordorder","q":"Tom cannot remember ..................","opts":["where are kept the files","where are the files kept","where the files kept are","where the files are kept"],"ans":3,"exp":"الجملة هنا ليست سؤالًا مباشرًا (Embedded Question)، فالترتيب يكون: أداة الاستفهام + الفاعل + الفعل."},
{"id":"nq_36","sec":"gram","skill":"passive","q":"Dairy products should ......................... to keep them fresh.","opts":["refrigerate","refrigerating","be refrigerate","be refrigerated"],"ans":3,"exp":"مبني للمجهول مع الأفعال الناقصة: should + be + V3."},
{"id":"nq_37","sec":"gram","skill":"passive","q":"The box ............................. from recycled paper.","opts":["was made","was making","made","make"],"ans":0,"exp":"مبني للمجهول في الماضي: الصندوق صُنِع (was made)."},
{"id":"nq_38","sec":"gram","skill":"conditionals","q":"if I ....................... there, I ....................... said something to the manager.","opts":["was/ would had","have been/will have","had been / would have","were / would had"],"ans":2,"exp":"حالة If الثالثة للندم في الماضي: If + ماضي تام (had been)، والطرف الثاني would have + V3."},
{"id":"nq_39","sec":"gram","skill":"tenses","q":"After he ................. the door, he discovered that his keys were not in his pocket.","opts":["was closing","was closed","had closed","has closed"],"ans":2,"exp":"حدثان في الماضي، الأول (إغلاق الباب) أسبق، فيأخذ الماضي التام (had closed)."},
{"id":"nq_40","sec":"write","skill":"best","q":"To which sentence below can we add the following clause?\n- Are you going to the party tonight? .........................","opts":["Thank you","I was playing football","You bet","I am here"],"ans":2,"exp":"الرد المناسب على السؤال هو You bet (بالتأكيد)."},
{"id":"nq_41","sec":"gram","skill":"conditionals","q":"If it rains tomorrow, I .................... my raincoat.","opts":["wear","am wear","will wear","going to wear"],"ans":2,"exp":"حالة If الأولى: مضارع بسيط (rains)، والطرف الثاني will + المصدر."},
{"id":"nq_42","sec":"gram","skill":"tenses","q":"Adam …………… a book now.","opts":["reads","reading","is reads","is reading"],"ans":3,"exp":"كلمة now تدل على المضارع المستمر is + ing."},
{"id":"nq_43","sec":"gram","skill":"tenses","q":"When I go to King Saud University Library, I usually ………………","opts":["am studying","will study","studied","study"],"ans":3,"exp":"كلمة usually تدل على العادة والتكرار = مضارع بسيط."},
{"id":"nq_44","sec":"write","skill":"error","q":"Which one of the underlined words or phrases is INCORRECT?\nI don't had enough money to buy a bus ticket, so I'll have to walk to school today.","opts":["had","to buy","so","have to"],"ans":0,"exp":"بعد don't يجب أن يأتي المصدر (have) وليس (had)."},
{"id":"nq_45","sec":"write","skill":"wordorder","q":"Which of the following sentences has the CORRECT WORD ORDER?","opts":["A lot of value to our company both Ben and Mike add, but are more important to us Ben's IT skills than Mike's marketing knowledge.","Ben and Mike add a lot of value to our company both, but Ben's IT skills are more important to us than Mike's marketing knowledge.","Both Ben and Mike add a lot of value to our company, but Ben's IT skills are more important to us than Mike's marketing knowledge.","But Ben's IT skills are more important to us than Mike's marketing knowledge, a lot of value to our company Ben and Mike both add."],"ans":2,"exp":"هذا الترتيب الصحيح: الفاعل Both Ben and Mike ثم الفعل add والمفعول به."},

/* ================= STATE ================= */
const LS_KEY="stepprep_v1";
let S = load();
function load(){ try{ const d=JSON.parse(localStorage.getItem(LS_KEY)); if(d&&d.stats){ d.log=d.log||[]; return d; } }catch(e){} return {stats:{}, exams:[], mistakes:[], log:[]}; }
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(S)); }
/* stats: {qid:{t:tries,c:correct}} per question; skill aggregation computed */

function recordAnswer(q, ok, choice, mode, exId){
  const st = S.stats[q.id] || (S.stats[q.id]={t:0,c:0});
  st.t++; if(ok) st.c++;
  const entry={q:q.id, ok:ok?1:0, ch:(choice==null?-1:choice), m:mode||"p", ts:Date.now()};
  if(exId) entry.ex=exId;
  (S.log=S.log||[]).push(entry);
  if(!ok){ if(!S.mistakes.includes(q.id)) S.mistakes.push(q.id); }
  else { S.mistakes = S.mistakes.filter(x=>x!==q.id); }
  save(); renderNav();
}
/* يعيد بناء الإحصائيات والأخطاء من السجل — يُستخدم بعد حذف اختبار حتى تُزال مساهمته من تحليل مستواك */
function rebuildFromLog(){
  const stats={}, lastOk={};
  (S.log||[]).forEach(e=>{
    const s=stats[e.q]||(stats[e.q]={t:0,c:0}); s.t++; if(e.ok)s.c++;
    lastOk[e.q]=e.ok;
  });
  S.stats=stats;
  S.mistakes=Object.keys(lastOk).filter(qid=>!lastOk[qid] && BANK.some(q=>q.id===qid));
  save();
}
/* تصفير نهائي للأخطاء: يحذف أسئلة القائمة من السجل والإحصائيات معًا حتى لا تعود بعد أي حذف اختبار */
function clearAllMistakes(){
  const ids=new Set(S.mistakes);
  S.log=(S.log||[]).filter(e=>!ids.has(e.q));
  ids.forEach(id=>{ delete S.stats[id]; });
  S.mistakes=[];
  save();
}
function skillStats(){
  const agg={};
  for(const q of BANK){ const st=S.stats[q.id]; if(!st||!st.t) continue;
    const a=agg[q.skill]||(agg[q.skill]={t:0,c:0}); a.t+=st.t; a.c+=st.c; }
  return agg;
}
function overallStats(){
  let t=0,c=0,answered=0;
  for(const q of BANK){ const st=S.stats[q.id]; if(st&&st.t){answered++; t+=st.t; c+=st.c;} }
  return {t,c,answered,total:BANK.length};
}

/* ================= UTIL ================= */
const $=s=>document.querySelector(s);
function el(html){ const d=document.createElement("div"); d.innerHTML=html; return d.firstElementChild; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
const LETTERS=["A","B","C","D"];
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function formatQText(text) {
  if (!text) return "";
  let t = String(text);
  if (/(?:\(\d+\)|\[\d+\])/.test(t)) {
    t = t.replace(/\s*(\(\d+\)|\[\d+\])\s*/g, '<br><span style="display:inline-block; font-weight:bold; color:#0ea5e9; margin-right:6px; margin-top:8px;">$1</span> ');
    if (t.startsWith('<br>')) t = t.substring(4);
    t = '<div style="line-height:1.8; text-align:left; direction:ltr;">' + t + '</div>';
  }
  return t;
}

function ytLink(qy){ return "https://www.youtube.com/results?search_query="+encodeURIComponent(qy); }

/* ================= TTS ================= */
let voices=[];
function loadVoices(){ voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith("en")); }
if("speechSynthesis" in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function speak(text, btn){
  if(!("speechSynthesis" in window)){ alert("المتصفح لا يدعم تشغيل الصوت"); return; }
  speechSynthesis.cancel();
  const parts = text.split("|");
  parts.forEach((p,i)=>{
    const u=new SpeechSynthesisUtterance(p.trim());
    u.lang="en-US"; u.rate=0.92;
    const male=voices.find(v=>/david|male|guy/i.test(v.name)), female=voices.find(v=>/zira|female|jenny|aria/i.test(v.name));
    u.voice = (i%2===0? (female||voices[0]) : (male||voices[1]||voices[0])) || null;
    speechSynthesis.speak(u);
  });
  if(btn){ btn.textContent="⏸ إيقاف"; const iv=setInterval(()=>{ if(!speechSynthesis.speaking){btn.textContent="▶ استمع"; clearInterval(iv);} },300); }
}

/* skill row with fix button */
function skillAccuracy(){ const agg=skillStats(); const out=[];
  for(const id in agg){ const a=agg[id]; out.push({id, name:SKILLS[id].name, sec:SKILLS[id].sec, t:a.t, pct:Math.round(a.c/a.t*100)}); }
  return out;
}
function weakestSkills(n){ return skillAccuracy().filter(s=>s.pct<70&&s.t>=2).sort((a,b)=>a.pct-b.pct).slice(0,n); }
function skillRow(s){
  const color = s.pct>=70?"var(--good)":s.pct>=50?"var(--accent)":"var(--bad)";
  const r=el(`<div class="skillrow"><span class="nm">${s.name} <span class="tag">(${s.t} محاولة)</span></span>

  r.querySelector(".fix").onclick=()=>openLesson(s.id);

}

/* ================= QUESTION CARD (shared) ================= */
function questionCard(q, idx, total, opts){
  // opts: {instant:bool, onAnswer(choice, ok), onNext()}
  const wrap=el(`<div class="card"></div>`);
  const secName=SECTIONS[q.sec].name, skName=SKILLS[q.skill].name;
  wrap.appendChild(el(`<div class="qmeta"><span class="chip">${secName}</span><span class="chip acc">${skName}</span><span class="tag">سؤال ${idx+1} من ${total}</span></div>`));
  wrap.appendChild(el(`<div class="progressbar"><i style="width:${(idx)/total*100}%"></i></div>`));
  if(q.pid && PASSAGES[q.pid]) wrap.appendChild(el(`<div class="passage en">${PASSAGES[q.pid]}</div>`));
  if(q.audio){
    const tb=el(`<div class="ttsbox"><audio controls preload="metadata" src="${q.audio}" style="flex:1;min-width:220px"></audio><span class="tag">🎧 شغّل المقطع الصوتي ثم أجب — تقدر تعيده</span></div>`);
    wrap.appendChild(tb);
  } else if(q.tts){
    const tb=el(`<div class="ttsbox"><button class="btn accent" id="ttsplay">▶ استمع</button><span class="tag">🎧 شغّل المقطع الصوتي ثم أجب — تقدر تعيده</span></div>`);
    wrap.appendChild(tb);
    tb.querySelector("#ttsplay").onclick=e=>speak(q.tts, e.target);
  }
  wrap.appendChild(el(`<p class="qtext ${/[A-Za-z]/.test(q.q)&&!/[؀-ۿ]/.test(q.q)?'en':''}">${formatQText(q.q)}</p>`));
  const optsEl=el(`<div class="opts"></div>`); wrap.appendChild(optsEl);
  let answered=false;
  q.opts.forEach((o,i)=>{
    const b=el(`<button class="opt"><span class="letter">${LETTERS[i]}.</span><span>${esc(o)}</span></button>`);
    b.onclick=()=>{
      if(answered && opts.instant) return;
      if(opts.instant){
        answered=true;
        [...optsEl.children].forEach((c,ci)=>{ c.disabled=true; if(ci===q.ans) c.classList.add("correct"); });
        const ok = i===q.ans;
        if(!ok) b.classList.add("wrong");
        showExplain(wrap, q, ok, i);
        opts.onAnswer(i, ok);
        const nx=el(`<div class="btnrow"><button class="btn" id="nextb">${idx+1===total?"عرض النتيجة":"السؤال التالي ←"}</button></div>`);
        wrap.appendChild(nx); nx.querySelector("#nextb").onclick=opts.onNext;
        nx.querySelector("#nextb").focus();
      } else {
        [...optsEl.children].forEach(c=>c.classList.remove("sel"));
        b.classList.add("sel");
        opts.onAnswer(i, i===q.ans);
      }
    };
    if(opts.selected===i) b.classList.add("sel");
    optsEl.appendChild(b);
  });
  return wrap;
}
function showExplain(wrap, q, ok, chosen){
  const sk=SKILLS[q.skill];
  const why = ok? "" : (q.trap && q.trap[chosen] ? `<div><b>ليش خيارك غلط؟</b> ${q.trap[chosen]}</div>` : `<div><b>ليش خيارك غلط؟</b> اخترت «${esc(q.opts[chosen])}» وهي لا تحقق القاعدة المطلوبة هنا.</div>`);
  const ex=el(`<div class="explain ${ok?"good":"bad"}">
    <div class="verdict">${ok?"✅ إجابة صحيحة! ممتاز":"❌ إجابة خاطئة — الصحيح: "+LETTERS[q.ans]+". "+esc(q.opts[q.ans])}</div>
    ${why}
    <div><b>الشرح:</b> ${q.exp}</div>
    <div class="rulelink"><button class="btn secondary" style="padding:6px 14px;font-size:.85rem">📚 راجع قاعدة «${sk.name}» + دروس يوتيوب</button></div>
  </div>`);
  ex.querySelector("button").onclick=()=>openLesson(q.skill);
  wrap.appendChild(ex);
  ex.scrollIntoView({behavior:"smooth",block:"nearest"});
}

/* ================= ADAPTIVE ENGINE ================= */
/* يحسب أولوية كل سؤال من: ضعف المهارة × وزن القسم × حالة السؤال (خطأ مفتوح / متقن / جديد)
   ثم يسحب عينة مرجحة — نفس عائلة خوارزميات الاختبارات التكيفية والتكرار المتباعد */
function qPriority(q, agg){
  const st=S.stats[q.id];
  const a=agg[q.skill];
  const skPct = a&&a.t? a.c/a.t*100 : null;
  const secW = SECTIONS[q.sec].pct/40 + 0.5;          // وزن القسم في ستيب
  let p=1;
  if(skPct==null) p+=1.4;                              // مهارة لم تُستكشف: استكشاف إجباري
  else p+=Math.max(0,(78-skPct))/22;                   // كلما ضعفت المهارة زادت الأولوية
  if(S.mistakes.includes(q.id)){                       // تكرار متباعد: الخطأ المفتوح يعود
    const lastWrong=[...(S.log||[])].reverse().find(e=>e.q===q.id&&!e.ok);
    const hrs=lastWrong? (Date.now()-lastWrong.ts)/3600000 : 99;
    p+= hrs<1? 1.2 : hrs<6? 2.2 : 3.2;                 // يبتعد قليلًا ثم يعود بقوة
  }
  if(st && st.c===st.t && st.t>=2) p*=0.12;            // متقن: لا نهدر وقتك عليه
  else if(!st) p+=0.7;                                 // سؤال جديد: توسيع التغطية
  return p*secW;
}
function adaptivePick(n){
  const agg=skillStats();
  let pool=BANK.map(q=>({q, w:qPriority(q,agg)}));
  const picked=[];
  while(picked.length<n && pool.length){
    const tot=pool.reduce((s,x)=>s+x.w,0);
    let r=Math.random()*tot, ix=0;
    for(let i=0;i<pool.length;i++){ r-=pool[i].w; if(r<=0){ ix=i; break; } }
    picked.push(pool[ix].q); pool.splice(ix,1);
  }
  return picked;
}
function adaptiveWhy(qs){
  const agg=skillStats();
  const mist=qs.filter(q=>S.mistakes.includes(q.id)).length;
  const fresh=qs.filter(q=>!S.stats[q.id]).length;
  const weakSk=[...new Set(qs.map(q=>q.skill))].filter(id=>{const a=agg[id]; return a&&a.t&&(a.c/a.t*100)<70;}).map(id=>SKILLS[id].name);
  const parts=[];
  if(mist) parts.push(`<b>${mist}</b> من أخطائك المفتوحة (تكرار متباعد — رجعناها لك في التوقيت الأمثل للتثبيت)`);
  if(weakSk.length) parts.push(`استهداف مهاراتك الضعيفة: <b>${weakSk.slice(0,4).join("، ")}</b>`);
  if(fresh) parts.push(`<b>${fresh}</b> سؤالًا جديدًا لتوسيع خريطة تحليلك`);
  return parts.length? "لماذا هذه الأسئلة تحديدًا؟ المحرك اختار: "+parts.join(" + ")+".":"";
}
function startAdaptive(n){
  const qs=adaptivePick(n);
  const why=adaptiveWhy(qs);
  startPractice(qs,"🧠 التدريب الذكي التكيفي",why);
}

function buildExam(n){
  /* ترتيب الأقسام كما تُعرض في الاختبار المحوسب، مع إبقاء أسئلة كل قطعة قراءة متتالية */
  const order=["listen","gram","read","write"];
  const mix={read:.4,gram:.3,listen:.2,write:.1};
  let out=[];
  for(const k of order){
    const want=Math.max(1,Math.round(n*mix[k]));
    if(k==="read"){
      const byPid={}; BANK.filter(q=>q.sec==="read").forEach(q=>{(byPid[q.pid]=byPid[q.pid]||[]).push(q);});
      const sel=[];
      for(const pid of shuffle(Object.keys(byPid))){
        if(sel.length>=want) break;
        sel.push(...shuffle(byPid[pid]).slice(0, want-sel.length));
      }
      out=out.concat(sel);
    } else if(k==="listen"){
      /* إبقاء أسئلة كل مقطع صوتي (audio) متتالية على شاشة واحدة */
      const byAid={}; BANK.filter(q=>q.sec==="listen").forEach(q=>{ const key=q.aid||q.id; (byAid[key]=byAid[key]||[]).push(q); });
      const sel=[];
      for(const key of shuffle(Object.keys(byAid))){
        if(sel.length>=want) break;
        sel.push(...byAid[key]);
      }
      out=out.concat(sel);
    } else {
      out=out.concat(shuffle(BANK.filter(q=>q.sec===k)).slice(0,want));
    }
  }
  return out.slice(0,n);
}

  const partsDef=[["listen","Listening"],["gram","Structure"],["read","Reading Comprehension"],["write","Writing Analysis"]];

  function examAudio(q){

  }
  function player(q){

    const w=el(`<div><div class="aplayer">

    const btn=w.querySelector(".pp"), bar=w.querySelector(".abar i"), tm=w.querySelector(".atime");

  function renderX(){ if(audioCd){clearInterval(audioCd);audioCd=null;} if(audioPoll){clearInterval(audioPoll);audioPoll=null;} ({intro:introView, q:questionView, review:reviewView})[phase](); }

/* ================= EXAM DETAIL (rich per-attempt analytics) ================= */
function openExamDetail(exam){
  current="exam"; renderNav();
  const v=$("#view"); v.innerHTML="";
  const pct=Math.round(exam.c/exam.n*100), band=bandOf(pct);
  const fmtMS=s=>Math.floor(s/60)+":"+String(Math.round(s)%60).padStart(2,"0");
  v.appendChild(el(`<div class="btnrow" style="margin-bottom:2px"><button class="btn secondary" id="backex">→ رجوع لقائمة الاختبارات</button></div>`));
  $("#backex").onclick=()=>{ current="exam"; render(); };

  if(!exam.detail){
    v.appendChild(el(`<div class="card scorehero ${pct<60?"failing":""}"><div class="big">${pct}%</div>
      <p><b>${exam.c}</b> صحيحة من <b>${exam.n}</b> — ${band}</p>
      <p class="sub">${new Date(exam.d).toLocaleString("ar-SA")}</p></div>`));
    v.appendChild(el(`<div class="card"><div class="notice">هذا اختبار قديم أُجري قبل ميزة التحليل المفصّل، فلا تتوفر تفاصيل أسئلته. أي اختبار جديد تُحفظ كل تفاصيله وتظهر هنا تحليلًا كاملًا.</div></div>`));
    window.scrollTo({top:0}); return;
  }

  const det=exam.detail.map(d=>({d,q:BANK.find(x=>x.id===d.qid)})).filter(x=>x.q);
  const wrong=exam.detail.filter(d=>!d.ok && d.ch>=0).length;
  const blank=exam.detail.filter(d=>d.ch<0).length;
  const usedSec=exam.used||0, avg=exam.n?usedSec/exam.n:0;
  /* confidence interval (Wald) */
  const prA=exam.c/exam.n, moe=Math.min(40,Math.round(1.96*Math.sqrt(prA*(1-prA)/Math.max(1,exam.n))*100));
  const ciLo=Math.max(0,pct-moe), ciHi=Math.min(100,pct+moe);
  /* section + skill aggregation */
  const bySec={}, bySkill={};
  det.forEach(({d,q})=>{ const s=bySec[q.sec]||(bySec[q.sec]={t:0,c:0}); s.t++; if(d.ok)s.c++;
    const k=bySkill[q.skill]||(bySkill[q.skill]={t:0,c:0}); k.t++; if(d.ok)k.c++; });
  const secPct={}; for(const k in SECTIONS){ const s=bySec[k]; secPct[k]=s&&s.t?Math.round(s.c/s.t*100):null; }
  const secList=Object.keys(bySec).filter(k=>bySec[k].t>=2);
  const bestSec=secList.slice().sort((a,b)=>secPct[b]-secPct[a])[0];
  const worstSec=secList.slice().sort((a,b)=>secPct[a]-secPct[b])[0];

  /* hero */
  v.appendChild(el(`<div class="card scorehero ${pct<60?"failing":""}" style="padding-bottom:16px">
    <div class="big">${pct}%</div>
    <div class="chip" style="font-size:.9rem">${band}</div>
    <p class="tag" style="margin:10px 0 0">نطاق الثقة الإحصائي 95٪: <b>${ciLo}–${ciHi}٪</b> (±${moe})<br>${new Date(exam.d).toLocaleString("ar-SA")}</p>
  </div>`));

  /* mini stats */
  const ms=el(`<div class="card"><h3>ملخص المحاولة</h3><div class="mini">
    <div class="stat"><b style="color:var(--good)">${exam.c}</b><span>صحيحة</span></div>
    <div class="stat"><b style="color:var(--bad)">${wrong}</b><span>خاطئة</span></div>
    <div class="stat"><b style="color:var(--muted)">${blank}</b><span>بلا إجابة</span></div>
    <div class="stat"><b>${exam.n}</b><span>إجمالي</span></div>
  </div>
  <div class="mini" style="margin-top:2px">
    <div class="stat"><b>${fmtMS(usedSec)}</b><span>الوقت المستغرق</span></div>
    <div class="stat"><b>${exam.mins||"—"}:00</b><span>الوقت المتاح</span></div>
    <div class="stat"><b>${avg?avg.toFixed(0)+"ث":"—"}</b><span>معدل السؤال</span></div>
    <div class="stat"><b>${usedSec&&exam.mins?Math.round(usedSec/(exam.mins*60)*100):0}%</b><span>استغلال الوقت</span></div>
  </div></div>`);
  v.appendChild(ms);

  /* radar + section bars */
  const g=el(`<div class="grid2">
    <div class="card"><h3>🕸 رادار الأقسام</h3><div class="radarbox">${radarSVG(secPct)}</div></div>
    <div class="card"><h3>الأداء حسب القسم</h3><div id="sb"></div></div></div>`);
  v.appendChild(g);
  const sb=g.querySelector("#sb");
  for(const k in SECTIONS){ const s=bySec[k]; if(!s||!s.t) continue; const p=Math.round(s.c/s.t*100);
    sb.appendChild(el(`<div class="skillrow"><span class="nm">${SECTIONS[k].name} <span class="tag">وزنه ${SECTIONS[k].pct}٪</span></span>

      <span class="pct">${s.c}/${s.t}</span></div>`)); }

  /* narrative */
  let narr=`في هذه المحاولة جاوبت <b>${exam.c}</b> صحيحة من <b>${exam.n}</b>، بنسبة <b>${pct}٪</b> (${band}).`;
  if(bestSec&&worstSec&&bestSec!==worstSec) narr+=` أقوى أقسامك هنا <b>${SECTIONS[bestSec].name} (${secPct[bestSec]}٪)</b> وأضعفها <b>${SECTIONS[worstSec].name} (${secPct[worstSec]}٪)</b>.`;
  if(avg) narr+= avg>90?` معدل ${avg.toFixed(0)} ثانية للسؤال مرتفع — درّب على السرعة حتى لا يفوتك الوقت.`:avg<20?` معدلك ${avg.toFixed(0)} ثانية للسؤال سريع جدًا — تأكد أنك لا تتعجل وتخطئ في أسئلة تقدر عليها.`:` معدل ${avg.toFixed(0)} ثانية للسؤال متوازن.`;
  if(blank) narr+=` تركت <b>${blank}</b> سؤالًا بلا إجابة — في ستيب لا خصم على الخطأ، فخمّن دائمًا بدل الترك.`;
  v.appendChild(el(`<div class="card"><h3>💡 قراءة سريعة</h3><p class="narr">${narr}</p></div>`));

  /* skill breakdown */
  const skArr=Object.keys(bySkill).map(id=>({id,t:bySkill[id].t,c:bySkill[id].c,pct:Math.round(bySkill[id].c/bySkill[id].t*100)})).sort((a,b)=>a.pct-b.pct);
  const skc=el(`<div class="card"><h3>🗺 المهارات في هذه المحاولة (${skArr.length})</h3><p class="sub">مرتبة من الأضعف — اضغط «قوّها» للشرح ودروس يوتيوب.</p><div id="sk"></div></div>`);
  v.appendChild(skc); const skb=skc.querySelector("#sk");
  skArr.forEach(s=>{ const [lbl,col]=statusOf(s.pct);
    const row=el(`<div class="skillrow"><span class="nm">${SKILLS[s.id].name} <span class="tag">(${s.c}/${s.t})</span></span>
      <span class="stchip" style="background:${col}">${lbl}</span>
      <span class="bar"><i style="width:${s.pct}%;background:${col}"></i></span><span class="pct">${s.pct}%</span>
      <button class="fix">قوّها 📚</button></div>`);
    row.querySelector(".fix").onclick=()=>openLesson(s.id);
    skb.appendChild(row); });

  /* redo wrong */
  const wrongQs=det.filter(x=>!x.d.ok).map(x=>x.q);
  if(wrongQs.length){
    const rw=el(`<div class="card"><h3>🔁 إعادة أخطاء هذا الاختبار (${wrongQs.length})</h3>
      <p class="sub">أعد حلها بتصحيح فوري وشرح لكل سؤال.</p>
      <div class="btnrow"><button class="btn" id="redoex">ابدأ إعادة الأخطاء</button></div></div>`);
    v.appendChild(rw);
    rw.querySelector("#redoex").onclick=()=>startPractice(shuffle(wrongQs.slice()),"إعادة أخطاء اختبار "+new Date(exam.d).toLocaleDateString("ar-SA"));
  }

  /* full question-by-question */
  const rc=el(`<div class="card"><h3>مراجعة كل الأسئلة (${det.length})</h3><div id="allq"></div></div>`);
  v.appendChild(rc); const allq=rc.querySelector("#allq");
  det.forEach(({d,q},i)=>{
    const yourTxt = d.ch>=0? esc(q.opts[d.ch]) : "— لم تُجب —";
    const it=el(`<div class="review-item ${d.ok?"ok":"no"}">
      <div class="qmeta"><span class="tag" style="font-weight:700">${i+1}</span><span class="chip">${SECTIONS[q.sec].name}</span><span class="chip acc">${SKILLS[q.skill].name}</span></div>
      <p class="qtext ${/[؀-ۿ]/.test(q.q)?'':'en'}" style="font-size:1rem">${formatQText(q.q)}</p>
      <p class="en" style="margin:4px 0">${d.ok?'':`<b style="color:var(--bad)">إجابتك:</b> ${yourTxt}<br>`}<b style="color:var(--good)">${d.ok?'إجابتك (صحيحة):':'الصحيح:'}</b> ${esc(q.opts[q.ans])}</p>
      <p style="font-size:.92rem"><b>الشرح:</b> ${q.exp}</p>
      <button class="btn secondary" style="padding:5px 12px;font-size:.82rem">📚 راجع القاعدة</button></div>`);
    it.querySelector("button").onclick=()=>openLesson(q.skill);
    allq.appendChild(it);
  });
  window.scrollTo({top:0});
}

function sectionAgg(){
  const out={};
  for(const q of BANK){ const st=S.stats[q.id]; if(!st||!st.t) continue;
    const a=out[q.sec]||(out[q.sec]={t:0,c:0,qs:0}); a.t+=st.t; a.c+=st.c; a.qs++; }
  return out;
}
function bandOf(p){ return p>=90?"متقدم (97+)":p>=80?"ممتاز (83–96)":p>=65?"جيد جدًا (68–82)":p>=50?"جيد (52–67)":"يحتاج تأسيس (أقل من 52)"; }
function statusOf(pct){ return pct>=85?["متقن","#2E7D4F"]:pct>=70?["جيد","#0E8A7E"]:pct>=50?["هش","#C67F1E"]:["حرج","#C0392B"]; }
function stripHtml(s){ return s.replace(/<br\s*\/?>/g," ").replace(/<[^>]+>/g,"").replace(/\s+/g," ").trim(); }
const TIPS={

function radarSVG(vals){
  const cx=150,cy=140,R=95;
  const axes=[ {k:"read",a:-90,lx:150,ly:26,anch:"middle"}, {k:"gram",a:0,lx:262,ly:145,anch:"start"},
               {k:"listen",a:90,lx:150,ly:272,anch:"middle"}, {k:"write",a:180,lx:38,ly:145,anch:"end"} ];
  const pt=(ang,r)=>{ const rad=ang*Math.PI/180; return [cx+Math.cos(rad)*r, cy+Math.sin(rad)*r]; };
  let grid="";
  [25,50,75,100].forEach(g=>{
    const ps=axes.map(x=>pt(x.a,R*g/100).join(",")).join(" ");
    grid+=`<polygon points="${ps}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  });
  const axlines=axes.map(x=>{ const [px,py]=pt(x.a,R); return `<line x1="${cx}" y1="${cy}" x2="${px}" y2="${py}" stroke="var(--line)"/>`; }).join("");
  const poly=axes.map(x=>pt(x.a, R*(vals[x.k]==null?0:vals[x.k])/100).join(",")).join(" ");
  const dots=axes.map(x=>{ const [px,py]=pt(x.a, R*(vals[x.k]==null?0:vals[x.k])/100); return `<circle cx="${px}" cy="${py}" r="4" fill="var(--brand)"/>`; }).join("");
  const labels=axes.map(x=>`<text x="${x.lx}" y="${x.ly}" text-anchor="${x.anch}" font-size="13" font-weight="700" fill="var(--ink)">${SECTIONS[x.k].name}</text>
    <text x="${x.lx}" y="${x.ly+16}" text-anchor="${x.anch}" font-size="12" fill="var(--muted)">${vals[x.k]==null?"—":vals[x.k]+"%"}</text>`).join("");
  return `<svg viewBox="0 0 300 300" role="img" aria-label="رادار الأقسام">${grid}${axlines}
    <polygon points="${poly}" fill="var(--brand)" fill-opacity="0.22" stroke="var(--brand)" stroke-width="2.5" stroke-linejoin="round"/>${dots}${labels}</svg>`;
}
function buildReport(){
  const o=overallStats(), acc=o.t?Math.round(o.c/o.t*100):0, secA=sectionAgg();
  let wsum=0,wacc=0;
  for(const k in SECTIONS){ const a=secA[k]; if(a&&a.t){ wacc+=(a.c/a.t*100)*SECTIONS[k].pct; wsum+=SECTIONS[k].pct; } }
  const proj=wsum?Math.round(wacc/wsum):0;
  let xt=0,xc=0; S.exams.forEach(e=>{xt+=e.n;xc+=e.c;});
  const pt=o.t-xt, pc=o.c-xc;
  let r=`📊 تقرير مستواي — منصة ستيب برو (${new Date().toLocaleDateString("ar-SA")})\n`;
  r+=`رجاءً حلّل هذا التقرير بدقة: قيّم مستواي، حدد أخطر نقاط ضعفي، وأعطني خطة مراجعة ليومين.\n\n`;
  r+=`== الإجمالي ==\n${o.t} إجابة (${o.c} صحيحة، ${acc}%) على ${o.answered} من ${BANK.length} سؤالًا\n`;
  r+=`الدرجة المتوقعة (مرجحة بأوزان ستيب 40/30/20/10): ${proj}% — ${bandOf(proj)}\n`;
  if(xt) r+=`تحت ضغط المؤقت (محاكاة): ${Math.round(xc/xt*100)}% من ${xt} سؤالًا\n`;
  if(pt>0) r+=`بدون ضغط (تدريب): ${Math.round(pc/pt*100)}% من ${pt} سؤالًا\n`;
  r+=`\n== حسب القسم ==\n`;
  for(const k in SECTIONS){ const a=secA[k];
    r+= a&&a.t? `${SECTIONS[k].name} (وزنه ${SECTIONS[k].pct}%): ${a.c}/${a.t} = ${Math.round(a.c/a.t*100)}%\n` : `${SECTIONS[k].name}: لم يُختبر بعد!\n`; }
  r+=`\n== حسب المهارة ==\n`;
  const agg=skillStats();
  for(const id in SKILLS){ const a=agg[id];
    r+= a&&a.t? `- ${SKILLS[id].name}: ${a.c}/${a.t} (${Math.round(a.c/a.t*100)}%) [${statusOf(Math.round(a.c/a.t*100))[0]}]\n` : `- ${SKILLS[id].name}: لم تُختبر\n`; }
  const mq=BANK.filter(q=>S.mistakes.includes(q.id));
  r+=`\n== أسئلة ما زلت أخطئ فيها (${mq.length}) ==\n`;
  mq.forEach(q=>{
    const lastWrong=[...(S.log||[])].reverse().find(e=>e.q===q.id&&!e.ok&&e.ch>=0);
    r+=`- [${SKILLS[q.skill].name}] ${stripHtml(q.q)}\n  الصحيح: ${q.opts[q.ans]}${lastWrong?` | آخر اختيار لي: ${q.opts[lastWrong.ch]}`:""}\n`;
  });
  if(S.exams.length){ r+=`\n== سجل المحاكاة ==\n`;
    S.exams.forEach((e,i)=>r+=`${i+1}) ${new Date(e.d).toLocaleDateString("ar-SA")}: ${e.c}/${e.n} (${Math.round(e.c/e.n*100)}%)\n`); }
  return r;
}
