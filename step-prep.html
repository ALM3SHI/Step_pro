function renderAnalysis(v){
  const o=overallStats();
  if(!o.answered){
    v.appendChild(el(`<div class="card scorehero"><div class="big">📊</div><p>ما عندنا بيانات بعد — حل تدريبًا أو اختبار محاكاة أول، وبنرسم لك خريطة قوتك وضعفك بالتفصيل.</p>
      <div class="btnrow" style="justify-content:center"><button class="btn" id="g1">ابدأ اختبار تشخيصي</button></div></div>`));
    $("#g1").onclick=()=>{current="exam";render();};
    return;
  }
  const acc=Math.round(o.c/o.t*100), secA=sectionAgg(), agg=skillStats();
  /* weighted projection */
  let wsum=0,wacc=0; const secPct={};
  for(const k in SECTIONS){ const a=secA[k]; if(a&&a.t){ const p=Math.round(a.c/a.t*100); secPct[k]=p; wacc+=p*SECTIONS[k].pct; wsum+=SECTIONS[k].pct; } else secPct[k]=null; }
  const proj=wsum?Math.round(wacc/wsum):0;
  /* 95% confidence interval (Wald) on overall accuracy */
  const prA=o.c/o.t, moe=Math.min(30,Math.round(1.96*Math.sqrt(prA*(1-prA)/o.t)*100));
  const ciLo=Math.max(0,acc-moe), ciHi=Math.min(100,acc+moe);
  /* pressure: exam vs practice */
  let xt=0,xc=0; S.exams.forEach(e=>{xt+=e.n;xc+=e.c;});
  const pt=o.t-xt, pc=o.c-xc;
  const examAcc=xt?Math.round(xc/xt*100):null, pracAcc=pt>0?Math.round(pc/pt*100):null;
  /* learning behavior */
  let firstQ=0,fixed=0,still=0;
  for(const q of BANK){ const st=S.stats[q.id]; if(!st||!st.t)continue;
    if(st.c===st.t) firstQ++; else if(S.mistakes.includes(q.id)) still++; else fixed++; }
  const recov=(fixed+still)?Math.round(fixed/(fixed+still)*100):null;

  /* ---- hero: projected score + narrative ---- */
  const skAcc=skillAccuracy();
  const secList=Object.keys(SECTIONS).filter(k=>secA[k]&&secA[k].t>=4);
  const bestSec=secList.slice().sort((a,b)=>secPct[b]-secPct[a])[0];
  const worstSec=secList.slice().sort((a,b)=>secPct[a]-secPct[b])[0];
  let narr=`حللت لك <b>${o.t}</b> إجابة على <b>${o.answered}</b> سؤالًا مختلفًا. درجتك المتوقعة محسوبة بأوزان ستيب الرسمية (قراءة 40٪، قواعد 30٪، استماع 20٪، كتابة 10٪) وليست متوسطًا بسيطًا.`;
  if(bestSec&&worstSec&&bestSec!==worstSec) narr+=` أقوى أقسامك <b>${SECTIONS[bestSec].name} (${secPct[bestSec]}٪)</b> وأضعفها <b>${SECTIONS[worstSec].name} (${secPct[worstSec]}٪)</b> — وبما أن وزن ${SECTIONS[worstSec].name} في الاختبار ${SECTIONS[worstSec].pct}٪، فكل تحسّن فيه ينعكس مباشرة على درجتك.`;
  if(examAcc!=null&&pracAcc!=null){ const d=examAcc-pracAcc;
    narr+= d>=5?` المفاجأة الجميلة: أداؤك <b>تحت ضغط المؤقت أعلى بـ ${d} نقاط</b> من تدريبك الحر — أعصابك باردة يوم الاختبار وهذي ميزة نادرة.`
        : d<=-5?` انتبه: أداؤك <b>ينخفض ${-d} نقاط تحت ضغط المؤقت</b> (${examAcc}٪ في المحاكاة مقابل ${pracAcc}٪ في التدريب) — تحتاج محاكاة أكثر لتعتاد الضغط.`
        :` أداؤك <b>ثابت</b> تحت الضغط وخارجه (${examAcc}٪ محاكاة / ${pracAcc}٪ تدريب) — علامة استعداد نفسي ممتاز.`; }
  if(recov!=null) narr+= recov>=60?` ومن كل الأسئلة التي أخطأت فيها يومًا، عدت وصححت <b>${recov}٪</b> منها — أنت تتعلم من أخطائك فعلًا.`:` من الأسئلة التي أخطأت فيها، صححت لاحقًا <b>${recov}٪</b> فقط — أكبر فرصة لرفع درجتك هي إعادة قائمة أخطائك حتى تصفر.`;
  v.appendChild(el(`<div class="card"><h2>📊 بطاقة مستواك</h2>
    <div class="gaugegrid">
      <div class="scorehero" style="padding:10px"><div class="big">${proj}%</div><div class="chip" style="font-size:.9rem">${bandOf(proj)}</div>
        <p class="tag" style="margin:10px 0 0">نطاق الثقة الإحصائي 95٪: <b>${ciLo}–${ciHi}٪</b><br>يضيق كلما زادت إجاباتك (الآن ±${moe})</p></div>
      <p class="narr">${narr}</p>
    </div></div>`));

  /* ---- radar + learning metrics ---- */
  const g2=el(`<div class="grid2">
    <div class="card"><h3>🕸 رادار الأقسام الأربعة</h3><div class="radarbox">${radarSVG(secPct)}</div></div>
    <div class="card"><h3>🧠 سلوكك التعلمي</h3>
      <div class="lmet">
        <div class="stat"><b>${firstQ}</b><span>سؤال أتقنته من كل محاولة</span></div>
        <div class="stat"><b style="color:var(--good)">${fixed}</b><span>خطأ تعلمت منه وصححته</span></div>
        <div class="stat"><b style="color:var(--bad)">${still}</b><span>خطأ ما زال يسقطك</span></div>
      </div>
      ${recov!=null?`<div class="progressbar" style="margin-top:14px"><i style="width:${recov}%;background:var(--good)"></i></div><p class="tag">معدل التعافي من الخطأ: ${recov}٪ من أخطائك التاريخية صححتها لاحقًا</p>`:""}
      ${examAcc!=null&&pracAcc!=null?`<div class="skillrow"><span class="nm">تحت ضغط المؤقت</span><span class="bar"><i style="width:${examAcc}%;background:var(--brand)"></i></span><span class="pct">${examAcc}%</span></div>
      <div class="skillrow"><span class="nm">تدريب حر</span><span class="bar"><i style="width:${pracAcc}%;background:var(--accent)"></i></span><span class="pct">${pracAcc}%</span></div>`:""}
    </div></div>`);
  v.appendChild(g2);

  /* ---- smart insights ---- */
  const ins=[];
  const mq=BANK.filter(q=>S.mistakes.includes(q.id));
  if(mq.length>=4){
    const bySec={}; mq.forEach(q=>bySec[q.sec]=(bySec[q.sec]||0)+1);
    const topSec=Object.keys(bySec).sort((a,b)=>bySec[b]-bySec[a])[0];
    const share=Math.round(bySec[topSec]/mq.length*100);
    if(share>=50) ins.push(["🔎",`<b>${share}٪ من أخطائك الحالية متركزة في ${SECTIONS[topSec].name}</b> — هذا القسم وزنه ${SECTIONS[topSec].pct}٪ من الاختبار، فأسرع مكسب لدرجتك يبدأ منه.`]);
  }
  skAcc.filter(s=>s.pct<70&&s.t>=2).sort((a,b)=>a.pct-b.pct).slice(0,3).forEach(s=>{
    if(TIPS[s.id]) ins.push(["🎯",`<b>${s.name} (${s.pct}٪):</b> ${TIPS[s.id]}`]);
  });
  if(still>0) ins.push(["🔁",`عندك <b>${still}</b> سؤالًا ما زالت تسقطك — أعدها الليلة من صفحة «أخطائي»، ثم مرة أخيرة صباح يوم الاختبار.`]);
  const untested=Object.keys(SECTIONS).filter(k=>!secA[k]||!secA[k].t);
  untested.forEach(k=>ins.push(["⚠️",`ما جربت قسم <b>${SECTIONS[k].name}</b> إطلاقًا وهو يشكل ${SECTIONS[k].pct}٪ من الاختبار — لا تدخل القاعة بمنطقة عمياء.`]));
  const unseen=BANK.length-o.answered;
  if(unseen>0) ins.push(["📚",`باقي <b>${unseen}</b> سؤالًا في البنك ما شفتها — كل سؤال جديد يزيد دقة هذا التحليل ويوسع تغطيتك.`]);
  const perfectSk=skAcc.filter(s=>s.pct===100&&s.t>=3);
  if(perfectSk.length) ins.push(["🏆",`مهارات متقنة 100٪: <b>${perfectSk.map(s=>s.name).join("، ")}</b> — لا تضيع وقت مراجعتك عليها، مرّ عليها مرورًا سريعًا فقط.`]);
  if(ins.length){
    const ic=el(`<div class="card"><h3>💡 استنتاجات ذكية عنك</h3><div id="insb"></div></div>`);
    v.appendChild(ic); const ib=ic.querySelector("#insb");
    ins.forEach(x=>ib.appendChild(el(`<div class="insight"><span class="ico">${x[0]}</span><span>${x[1]}</span></div>`)));
  }

  /* ---- priority plan ---- */
  const weak=skAcc.filter(s=>s.pct<70&&s.t>=2)
    .map(s=>({...s, score:(70-s.pct)/70*SECTIONS[s.sec].pct*Math.min(s.t,6)}))
    .sort((a,b)=>b.score-a.score).slice(0,3);
  if(weak.length){
    const pc2=el(`<div class="card"><h3>🚀 أولوياتك مرتبة بالأثر على الدرجة</h3>
      <p class="sub">الترتيب يوازن بين شدة الضعف ووزن القسم في الاختبار وعدد محاولاتك — الأولى هي أعلى مكسب متوقع لدرجتك.</p><div id="pr"></div></div>`);
    v.appendChild(pc2); const pr=pc2.querySelector("#pr");
    weak.forEach((s,i)=>{
      const row=el(`<div class="prio"><span class="rank">${i+1}</span>
        <span class="nm"><b>${s.name}</b><br><span class="tag">${SECTIONS[s.sec].name} — دقتك ${s.pct}٪ من ${s.t} محاولة</span></span>
        <button class="btn secondary" style="padding:7px 14px">📚 الشرح</button>
        <button class="btn" style="padding:7px 14px">تدرّب الآن</button></div>`);
      const bs=row.querySelectorAll("button");
      bs[0].onclick=()=>openLesson(s.id);
      bs[1].onclick=()=>startPractice(shuffle(BANK.filter(q=>q.skill===s.id)),"تدريب: "+s.name);
      pr.appendChild(row);
    });
  }

  /* ---- exam trend ---- */
  if(S.exams.length){
    const tc=el(`<div class="card"><h3>📈 مسار المحاكاة</h3><div id="tr"></div></div>`);
    v.appendChild(tc); const tr=tc.querySelector("#tr");
    S.exams.forEach((e,i)=>{ const p=Math.round(e.c/e.n*100);
      tr.appendChild(el(`<div class="skillrow"><span class="nm">محاكاة ${i+1} <span class="tag">${new Date(e.d).toLocaleDateString("ar-SA")} — ${e.n} سؤالًا</span></span>
        <span class="bar"><i style="width:${p}%;background:${p>=70?"var(--good)":p>=50?"var(--accent)":"var(--bad)"}"></i></span><span class="pct">${p}%</span></div>`)); });
    if(S.exams.length>=2){
      const f=Math.round(S.exams[0].c/S.exams[0].n*100), l=Math.round(S.exams[S.exams.length-1].c/S.exams[S.exams.length-1].n*100), d=l-f;
      tc.appendChild(el(`<p class="tag" style="margin-top:8px">${d>0?`⬆️ تحسنت <b>+${d}</b> نقطة منذ أول محاكاة`:d<0?`⬇️ انخفضت ${-d} نقطة منذ أول محاكاة — غالبًا إرهاق أو تشتت، خذ راحة وأعد`:"أداء ثابت بين المحاكاتين"}</p>`));
    }
  }

  /* ---- full skill matrix ---- */
  const mx=el(`<div class="card"><h3>🗺 مصفوفة الإتقان — كل المهارات الـ ${Object.keys(SKILLS).length}</h3>
    <p class="sub">متقن ≥85٪ · جيد 70–84٪ · هش 50–69٪ · حرج &lt;50٪ — والرمادي لم تختبره بعد.</p><div id="mxb"></div></div>`);
  v.appendChild(mx); const mxb=mx.querySelector("#mxb");
  for(const sec in SECTIONS){
    mxb.appendChild(el(`<h3 style="margin:14px 0 4px;color:var(--brand)">${SECTIONS[sec].name} <span class="tag">وزنه ${SECTIONS[sec].pct}٪</span></h3>`));
    for(const id in SKILLS){ if(SKILLS[id].sec!==sec) continue;
      const a=agg[id];
      if(a&&a.t){ const p=Math.round(a.c/a.t*100); const [lbl,col]=statusOf(p);
        const row=el(`<div class="skillrow"><span class="nm">${SKILLS[id].name} <span class="tag">(${a.t} محاولة)</span></span>
          <span class="stchip" style="background:${col}">${lbl}</span>
          <span class="bar"><i style="width:${p}%;background:${col}"></i></span><span class="pct">${p}%</span>
          <button class="fix">قوّيها 📚</button></div>`);
        row.querySelector(".fix").onclick=()=>openLesson(id);
        mxb.appendChild(row);
      } else {
        const row=el(`<div class="skillrow" style="opacity:.65"><span class="nm">${SKILLS[id].name}</span>
          <span class="stchip" style="background:var(--muted)">لم يُختبر</span>
          <span class="bar"><i style="width:0"></i></span><span class="pct">—</span>
          <button class="fix">جرّبها</button></div>`);
        row.querySelector(".fix").onclick=()=>startPractice(shuffle(BANK.filter(q=>q.skill===id)),"تدريب: "+SKILLS[id].name);
        mxb.appendChild(row);
      }
    }
  }

  /* ---- report + data mgmt ---- */
  const dc=el(`<div class="card"><h3>📋 تقرير للتحليل العميق</h3>
    <p class="sub">زر واحد يجهز تقريرًا كاملًا بكل أرقامك وأخطائك — انسخه والصقه لـ Claude في المحادثة وسيحلل مستواك ويرسم لك خطة مخصصة.</p>
    <div class="btnrow"><button class="btn accent" id="mkreport">📄 جهّز تقريري الكامل</button>
    <button class="btn secondary" id="reset" style="color:var(--bad)">🗑 تصفير كل التقدم</button></div></div>`);
  v.appendChild(dc);
  dc.querySelector("#mkreport").onclick=openReport;
  dc.querySelector("#reset").onclick=()=>{ if(confirm("متأكد؟ بيمسح كل إحصائياتك وأخطائك.")){ S={stats:{},exams:[],mistakes:[],log:[]}; save(); render(); } };
}

/* الخروج من ملء الشاشة لا يقطع الاختبار: يبقى في وضع التركيز ويقدر يرجع بزر ⛶ */
document.addEventListener("fullscreenchange",()=>{
  const ov=document.getElementById("fsoverlay");
  if(ov) ov.innerHTML="";
  const on=!!document.fullscreenElement;
  ["pfsbtn","fsbtn"].forEach(id=>{ const b=document.getElementById(id); if(b) b.classList.toggle("on",on); });
});

/* ================= THEME & INIT ================= */
$("#themebtn").onclick=()=>{
  const r=document.documentElement;
  const cur=r.getAttribute("data-theme");
  const dark=cur? cur==="dark" : matchMedia("(prefers-color-scheme: dark)").matches;
  r.setAttribute("data-theme", dark?"light":"dark");
};

/* ===== PWA: تشغيل كتطبيق ملء شاشة أفقي عند الإضافة للشاشة الرئيسية ===== */
(function setupPWA(){
  try{
    const head=document.head||document.getElementsByTagName("head")[0];
    const ensureMeta=(name,content)=>{ if(!document.querySelector(`meta[name="${name}"]`)){ const m=document.createElement("meta"); m.name=name; m.content=content; head.appendChild(m); } };
    ensureMeta("mobile-web-app-capable","yes");
    ensureMeta("apple-mobile-web-app-capable","yes");
    ensureMeta("apple-mobile-web-app-status-bar-style","black-translucent");
    ensureMeta("apple-mobile-web-app-title","STEP PRO");
    ensureMeta("theme-color","#01589b");
    // أيقونة SVG مضمّنة
    const icon="data:image/svg+xml,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512'><rect width='512' height='512' rx='96' fill='#01589b'/><text x='50%' y='54%' font-size='150' font-family='Arial' font-weight='bold' fill='#fff' text-anchor='middle' dominant-baseline='middle'>STEP</text><text x='50%' y='74%' font-size='60' font-family='Arial' fill='#4c9bd1' text-anchor='middle' dominant-baseline='middle'>PRO</text></svg>`);
    if(!document.querySelector('link[rel="apple-touch-icon"]')){ const l=document.createElement("link"); l.rel="apple-touch-icon"; l.href=icon; head.appendChild(l); }
    const manifest={ name:"STEP PRO — STEP Prep", short_name:"STEP PRO", start_url:".", display:"fullscreen", orientation:"landscape", background_color:"#01589b", theme_color:"#01589b", icons:[{src:icon,sizes:"512x512",type:"image/svg+xml"}] };
    if(!document.querySelector('link[rel="manifest"]')){ const ml=document.createElement("link"); ml.rel="manifest"; ml.href="data:application/manifest+json,"+encodeURIComponent(JSON.stringify(manifest)); head.appendChild(ml); }
  }catch(e){}
})();
/* محاولة قفل الاتجاه على الوضع الأفقي داخل ملء الشاشة (يعمل على معظم متصفحات الجوال) */
function tryLockLandscape(){ try{ if(screen.orientation&&screen.orientation.lock) screen.orientation.lock("landscape").catch(()=>{}); }catch(e){} }
document.addEventListener("fullscreenchange",()=>{ if(document.fullscreenElement) tryLockLandscape(); });

render();
</script>
